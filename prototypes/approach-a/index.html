<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
<title>The Deep Loop - Idle Biome</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg-deep: #0a0e1a;
    --bg-mid: #0f1528;
    --glow-green: #4aedc4;
    --glow-purple: #b44aed;
    --glow-teal: #2dd4bf;
    --glow-blue: #4a9eed;
    --glow-pink: #ed4a9e;
    --glow-amber: #edcf4a;
    --text-dim: #5a6a8a;
    --text-mid: #8a9ab0;
    --text-bright: #c8d8f0;
    --text-white: #eaf0ff;
    --danger: #ff4466;
    --phase-primordial: #4aedc4;
    --phase-growth: #4aed6a;
    --phase-complexity: #edcf4a;
    --phase-crisis: #ed7a4a;
    --phase-catastrophe: #ed4a4a;
  }

  body {
    background: var(--bg-deep);
    color: var(--text-bright);
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
    touch-action: manipulation;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
    -webkit-user-select: none;
  }

  /* ---- TOP BAR ---- */
  #top-bar {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    background: linear-gradient(180deg, rgba(10,14,26,0.95) 0%, rgba(10,14,26,0.7) 100%);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    padding: 8px 12px 6px;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .stats-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 13px;
  }

  .stat {
    display: flex;
    align-items: center;
    gap: 4px;
  }

  .stat-icon {
    width: 16px;
    height: 16px;
  }

  .stat-value {
    font-weight: 700;
    font-variant-numeric: tabular-nums;
  }

  .residue-val {
    color: var(--glow-teal);
    text-shadow: 0 0 8px rgba(74,237,196,0.5);
  }

  .species-val {
    color: var(--glow-green);
    text-shadow: 0 0 8px rgba(74,237,106,0.5);
  }

  .loop-val {
    color: var(--glow-purple);
    text-shadow: 0 0 8px rgba(180,74,237,0.5);
  }

  /* ---- PHASE BAR ---- */
  #phase-bar {
    display: flex;
    align-items: center;
    gap: 0;
    height: 22px;
    position: relative;
  }

  .phase-segment {
    flex: 1;
    height: 4px;
    background: rgba(255,255,255,0.06);
    position: relative;
    transition: background 0.5s;
  }

  .phase-segment:first-child { border-radius: 2px 0 0 2px; }
  .phase-segment:last-child { border-radius: 0 2px 2px 0; }

  .phase-segment.active {
    height: 6px;
    margin-top: -1px;
  }

  .phase-segment.completed { background: rgba(255,255,255,0.15); }

  .phase-segment[data-phase="primordial"].active { background: var(--phase-primordial); box-shadow: 0 0 10px rgba(74,237,196,0.5); }
  .phase-segment[data-phase="growth"].active { background: var(--phase-growth); box-shadow: 0 0 10px rgba(74,237,106,0.5); }
  .phase-segment[data-phase="complexity"].active { background: var(--phase-complexity); box-shadow: 0 0 10px rgba(237,207,74,0.5); }
  .phase-segment[data-phase="crisis"].active { background: var(--phase-crisis); box-shadow: 0 0 10px rgba(237,122,74,0.5); }
  .phase-segment[data-phase="catastrophe"].active { background: var(--phase-catastrophe); box-shadow: 0 0 10px rgba(237,74,74,0.5); animation: pulseCat 0.6s ease-in-out infinite; }

  @keyframes pulseCat {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
  }

  .phase-label {
    position: absolute;
    bottom: -1px;
    left: 0; right: 0;
    text-align: center;
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--text-dim);
    pointer-events: none;
  }

  .phase-segment.active .phase-label {
    color: var(--text-white);
    font-weight: 600;
  }

  #phase-name {
    text-align: center;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: var(--text-dim);
    margin-top: 2px;
  }

  #phase-timer {
    font-variant-numeric: tabular-nums;
    margin-left: 6px;
    opacity: 0.6;
  }

  /* ---- BIOME VIEW ---- */
  #biome-container {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    overflow: hidden;
  }

  #biome-svg {
    width: 100%;
    height: 100%;
  }

  #particle-canvas {
    position: fixed;
    top: 0; left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    z-index: 10;
  }

  /* ---- FOG OVERLAY ---- */
  #fog-overlay {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: radial-gradient(ellipse at center, transparent 30%, rgba(100,20,140,var(--fog-opacity,0)) 100%);
    pointer-events: none;
    z-index: 8;
    transition: opacity 0.5s;
  }

  /* ---- TAP ZONE ---- */
  #tap-zone {
    position: fixed;
    bottom: 120px;
    left: 50%;
    transform: translateX(-50%);
    width: 90px;
    height: 90px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(74,237,196,0.15) 0%, rgba(74,237,196,0.02) 70%, transparent 100%);
    border: 1.5px solid rgba(74,237,196,0.3);
    z-index: 20;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: transform 0.1s, box-shadow 0.2s;
  }

  #tap-zone:active {
    transform: translateX(-50%) scale(0.92);
    box-shadow: 0 0 30px rgba(74,237,196,0.4);
  }

  .tap-icon {
    width: 36px;
    height: 36px;
    opacity: 0.6;
  }

  .tap-amount {
    position: absolute;
    font-size: 18px;
    font-weight: 700;
    color: var(--glow-teal);
    text-shadow: 0 0 12px rgba(74,237,196,0.8);
    pointer-events: none;
    animation: floatUp 0.8s ease-out forwards;
  }

  @keyframes floatUp {
    0% { opacity: 1; transform: translateY(0) scale(1); }
    100% { opacity: 0; transform: translateY(-60px) scale(0.6); }
  }

  /* ---- BOTTOM BUTTONS ---- */
  #bottom-bar {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    z-index: 100;
    background: linear-gradient(0deg, rgba(10,14,26,0.95) 0%, rgba(10,14,26,0.7) 80%, transparent 100%);
    padding: 8px 12px 16px;
    display: flex;
    gap: 8px;
  }

  .bottom-btn {
    flex: 1;
    padding: 10px 6px;
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 10px;
    background: rgba(255,255,255,0.04);
    color: var(--text-mid);
    font-size: 12px;
    font-weight: 600;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
  }

  .bottom-btn:active {
    background: rgba(255,255,255,0.1);
    transform: scale(0.96);
  }

  .bottom-btn .btn-icon {
    display: block;
    font-size: 18px;
    margin-bottom: 2px;
  }

  .bottom-btn.locked {
    opacity: 0.35;
    pointer-events: none;
  }

  .bottom-btn.locked::after {
    content: 'Loop 2';
    position: absolute;
    top: 4px; right: 6px;
    font-size: 8px;
    color: var(--glow-purple);
    opacity: 0.7;
  }

  .bottom-btn.has-notification::before {
    content: '';
    position: absolute;
    top: 6px; right: 8px;
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--glow-teal);
    box-shadow: 0 0 6px var(--glow-teal);
  }

  /* ---- PROTAGONIST QUOTE ---- */
  #quote-bar {
    position: fixed;
    bottom: 118px;
    left: 12px;
    right: 12px;
    z-index: 30;
    pointer-events: none;
    min-height: 40px;
  }

  .quote-bubble {
    background: rgba(10,14,26,0.85);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 12px;
    padding: 10px 14px;
    font-size: 13px;
    font-style: italic;
    color: var(--text-mid);
    line-height: 1.4;
    animation: quoteIn 0.4s ease-out;
    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
  }

  .quote-bubble .speaker {
    font-size: 10px;
    color: var(--text-dim);
    font-style: normal;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 3px;
    display: block;
  }

  @keyframes quoteIn {
    0% { opacity: 0; transform: translateY(10px); }
    100% { opacity: 1; transform: translateY(0); }
  }

  .quote-bubble.fading {
    animation: quoteOut 0.4s ease-in forwards;
  }

  @keyframes quoteOut {
    0% { opacity: 1; transform: translateY(0); }
    100% { opacity: 0; transform: translateY(-10px); }
  }

  /* ---- SPECIES DISCOVERY POPUP ---- */
  .discovery-popup {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    z-index: 200;
    background: rgba(10,14,26,0.95);
    border: 1px solid rgba(74,237,196,0.3);
    border-radius: 16px;
    padding: 24px 20px;
    width: min(320px, 90vw);
    text-align: center;
    animation: popIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    box-shadow: 0 0 40px rgba(74,237,196,0.15), 0 20px 60px rgba(0,0,0,0.5);
  }

  @keyframes popIn {
    0% { opacity: 0; transform: translate(-50%, -50%) scale(0.7); }
    100% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
  }

  .discovery-popup h3 {
    color: var(--glow-green);
    text-shadow: 0 0 15px rgba(74,237,106,0.6);
    font-size: 14px;
    text-transform: uppercase;
    letter-spacing: 2px;
    margin-bottom: 12px;
  }

  .discovery-popup .species-preview {
    width: 80px;
    height: 80px;
    margin: 0 auto 12px;
  }

  .discovery-popup .species-name {
    font-size: 20px;
    font-weight: 700;
    color: var(--text-white);
    margin-bottom: 6px;
  }

  .discovery-popup .species-desc {
    font-size: 12px;
    color: var(--text-dim);
    margin-bottom: 16px;
    line-height: 1.4;
  }

  .discovery-popup .dismiss-btn {
    padding: 8px 28px;
    border: 1px solid rgba(74,237,196,0.3);
    border-radius: 20px;
    background: rgba(74,237,196,0.1);
    color: var(--glow-teal);
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
  }

  /* ---- MODAL / OVERLAY ---- */
  .modal-overlay {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(5,8,16,0.9);
    z-index: 500;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    animation: fadeIn 0.2s;
  }

  @keyframes fadeIn {
    0% { opacity: 0; }
    100% { opacity: 1; }
  }

  .modal-sheet {
    background: var(--bg-mid);
    border-radius: 20px 20px 0 0;
    width: 100%;
    max-width: 420px;
    max-height: 80vh;
    overflow-y: auto;
    padding: 20px 16px 32px;
    animation: slideUp 0.3s cubic-bezier(0.22, 1, 0.36, 1);
  }

  @keyframes slideUp {
    0% { transform: translateY(100%); }
    100% { transform: translateY(0); }
  }

  .modal-sheet h2 {
    font-size: 18px;
    color: var(--text-white);
    margin-bottom: 4px;
  }

  .modal-sheet .modal-subtitle {
    font-size: 12px;
    color: var(--text-dim);
    margin-bottom: 16px;
  }

  .modal-close {
    position: absolute;
    top: 16px;
    right: 16px;
    width: 30px;
    height: 30px;
    border-radius: 50%;
    background: rgba(255,255,255,0.06);
    border: none;
    color: var(--text-dim);
    font-size: 16px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .modal-header {
    position: relative;
    margin-bottom: 16px;
  }

  .modal-handle {
    width: 36px;
    height: 4px;
    border-radius: 2px;
    background: rgba(255,255,255,0.15);
    margin: 0 auto 16px;
  }

  /* ---- MARKETPLACE ---- */
  .shop-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px;
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 12px;
    margin-bottom: 8px;
    background: rgba(255,255,255,0.02);
    cursor: pointer;
    transition: all 0.15s;
  }

  .shop-item:active { background: rgba(255,255,255,0.06); transform: scale(0.98); }

  .shop-item.cant-afford { opacity: 0.4; }

  .shop-item .item-icon {
    width: 40px;
    height: 40px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    flex-shrink: 0;
  }

  .shop-item .item-info { flex: 1; }
  .shop-item .item-name { font-size: 14px; font-weight: 600; color: var(--text-white); }
  .shop-item .item-desc { font-size: 11px; color: var(--text-dim); margin-top: 2px; line-height: 1.3; }

  .shop-item .item-cost {
    font-size: 14px;
    font-weight: 700;
    color: var(--glow-teal);
    text-shadow: 0 0 6px rgba(74,237,196,0.4);
    white-space: nowrap;
  }

  .shop-item .item-owned {
    font-size: 11px;
    color: var(--glow-green);
    text-shadow: 0 0 6px rgba(74,237,106,0.4);
  }

  /* ---- CODEX ---- */
  .codex-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
  }

  .codex-entry {
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 12px;
    padding: 10px 8px;
    text-align: center;
    background: rgba(255,255,255,0.02);
  }

  .codex-entry .codex-icon {
    width: 44px;
    height: 44px;
    margin: 0 auto 6px;
  }

  .codex-entry .codex-name {
    font-size: 11px;
    font-weight: 600;
    color: var(--text-bright);
  }

  .codex-entry .codex-phase {
    font-size: 9px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .codex-entry.undiscovered {
    opacity: 0.25;
  }

  .codex-entry.undiscovered .codex-name {
    color: var(--text-dim);
  }

  /* ---- LOOP SUMMARY ---- */
  #loop-summary {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    z-index: 1000;
    background: var(--bg-deep);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px;
    animation: fadeIn 0.5s;
  }

  #loop-summary h1 {
    font-size: 28px;
    color: var(--danger);
    text-shadow: 0 0 30px rgba(237,68,68,0.6);
    margin-bottom: 6px;
    text-transform: uppercase;
    letter-spacing: 4px;
    animation: glitchText 0.15s ease-in-out 3;
  }

  @keyframes glitchText {
    0% { transform: translateX(0); }
    25% { transform: translateX(-3px); }
    50% { transform: translateX(3px); }
    75% { transform: translateX(-1px); }
    100% { transform: translateX(0); }
  }

  #loop-summary .summary-subtitle {
    font-size: 14px;
    color: var(--text-dim);
    margin-bottom: 28px;
  }

  .summary-stats {
    width: 100%;
    max-width: 300px;
    margin-bottom: 24px;
  }

  .summary-stat {
    display: flex;
    justify-content: space-between;
    padding: 8px 0;
    border-bottom: 1px solid rgba(255,255,255,0.05);
    font-size: 14px;
  }

  .summary-stat .s-label { color: var(--text-dim); }
  .summary-stat .s-value { color: var(--text-white); font-weight: 600; }

  .summary-knowledge {
    width: 100%;
    max-width: 300px;
    margin-bottom: 28px;
    padding: 14px;
    border: 1px solid rgba(180,74,237,0.2);
    border-radius: 12px;
    background: rgba(180,74,237,0.05);
  }

  .summary-knowledge h3 {
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--glow-purple);
    text-shadow: 0 0 10px rgba(180,74,237,0.5);
    margin-bottom: 8px;
  }

  .summary-knowledge p {
    font-size: 13px;
    color: var(--text-mid);
    line-height: 1.4;
  }

  #loop-summary .continue-btn {
    padding: 14px 40px;
    border: 1px solid rgba(74,237,196,0.3);
    border-radius: 24px;
    background: rgba(74,237,196,0.1);
    color: var(--glow-teal);
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    text-shadow: 0 0 8px rgba(74,237,196,0.4);
    transition: all 0.2s;
  }

  #loop-summary .continue-btn:active {
    background: rgba(74,237,196,0.2);
    transform: scale(0.96);
  }

  /* ---- CATASTROPHE FLASH ---- */
  .catastrophe-flash {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    z-index: 999;
    pointer-events: none;
    animation: catFlash 1.5s ease-out forwards;
  }

  @keyframes catFlash {
    0% { background: rgba(237,68,68,0.6); }
    20% { background: rgba(237,68,68,0.8); }
    40% { background: rgba(180,20,140,0.5); }
    100% { background: transparent; }
  }

  /* ---- SCREEN SHAKE ---- */
  .screen-shake {
    animation: shake 0.5s ease-in-out;
  }

  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    10% { transform: translateX(-6px) rotate(-0.5deg); }
    20% { transform: translateX(6px) rotate(0.5deg); }
    30% { transform: translateX(-4px); }
    40% { transform: translateX(4px); }
    50% { transform: translateX(-2px); }
  }

  /* ---- INTERVENTION PANEL ---- */
  .intervention-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .intervention-btn {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px;
    border: 1px solid rgba(180,74,237,0.15);
    border-radius: 12px;
    background: rgba(180,74,237,0.05);
    cursor: pointer;
    transition: all 0.15s;
  }

  .intervention-btn:active {
    background: rgba(180,74,237,0.12);
    transform: scale(0.98);
  }

  .intervention-btn.on-cooldown {
    opacity: 0.4;
    pointer-events: none;
  }

  .intervention-btn .int-icon {
    font-size: 22px;
    width: 36px;
    text-align: center;
  }

  .intervention-btn .int-info { flex: 1; }
  .intervention-btn .int-name { font-size: 13px; font-weight: 600; color: var(--glow-purple); text-shadow: 0 0 6px rgba(180,74,237,0.4); }
  .intervention-btn .int-desc { font-size: 11px; color: var(--text-dim); margin-top: 2px; }
  .intervention-btn .int-cost { font-size: 13px; font-weight: 700; color: var(--glow-teal); white-space: nowrap; }

  /* ---- AMBIENT ELEMENTS ---- */
  .ambient-text {
    position: fixed;
    z-index: 9;
    font-size: 11px;
    color: rgba(180,74,237,0.4);
    text-shadow: 0 0 10px rgba(180,74,237,0.3);
    font-style: italic;
    pointer-events: none;
    animation: ambientDrift 8s ease-in-out forwards;
  }

  @keyframes ambientDrift {
    0% { opacity: 0; transform: translateY(10px); }
    15% { opacity: 1; }
    85% { opacity: 1; }
    100% { opacity: 0; transform: translateY(-20px); }
  }

  /* Ground gradient */
  #ground-gradient {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    height: 40%;
    background: linear-gradient(0deg, rgba(15,25,20,0.6) 0%, transparent 100%);
    pointer-events: none;
    z-index: 1;
  }

  /* Section headers in modals */
  .section-label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--text-dim);
    margin: 16px 0 8px;
  }

  /* Notification toast */
  .toast {
    position: fixed;
    top: 70px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 300;
    background: rgba(10,14,26,0.9);
    border: 1px solid rgba(74,237,196,0.2);
    border-radius: 10px;
    padding: 8px 16px;
    font-size: 13px;
    color: var(--glow-teal);
    text-shadow: 0 0 6px rgba(74,237,196,0.3);
    animation: toastIn 0.3s ease-out, toastOut 0.3s ease-in 2s forwards;
    pointer-events: none;
  }

  @keyframes toastIn {
    0% { opacity: 0; transform: translateX(-50%) translateY(-10px); }
    100% { opacity: 1; transform: translateX(-50%) translateY(0); }
  }
  @keyframes toastOut {
    0% { opacity: 1; }
    100% { opacity: 0; transform: translateX(-50%) translateY(-10px); }
  }

  /* Idle indicator */
  .idle-indicator {
    position: fixed;
    top: 65px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 11px;
    color: var(--text-dim);
    z-index: 50;
    text-align: center;
    pointer-events: none;
    animation: fadeIn 1s;
  }

  /* Scrollbar styling */
  .modal-sheet::-webkit-scrollbar { width: 4px; }

// ========== INIT & SAVE/LOAD ==========
function loadState() {
  try {
    const saved = localStorage.getItem('deeploop_save');
    if (saved) {
      const parsed = JSON.parse(saved);
      // Merge with defaults
      for (const key in parsed) {
        if (state.hasOwnProperty(key)) state[key] = parsed[key];
      }
      state.lastTimestamp = Date.now();
      state.phaseStartTime = Date.now(); // reset phase timer on load
    }
  } catch(e) { console.warn('Failed to load save:', e); }
}

function saveState() {

// ========== CANVAS PARTICLES ==========
const canvas = document.getElementById('particle-canvas');
const ctx = canvas.getContext('2d');
let particles = [];
let ambientParticles = [];

function resizeCanvas() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
window.addEventListener('resize', resizeCanvas);
resizeCanvas();

class Particle {
  constructor(x, y, color, size, vx, vy, life) {
    this.x = x; this.y = y;
    this.color = color;
    this.size = size;
    this.vx = vx; this.vy = vy;
    this.life = life;
    this.maxLife = life;
  }
  update() {
    this.x += this.vx;
    this.y += this.vy;
    this.vy -= 0.02; // slight upward drift
    this.life--;
    this.vx *= 0.99;
    this.vy *= 0.99;
  }
  draw(ctx) {
    const alpha = Math.max(0, this.life / this.maxLife);
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size * alpha, 0, Math.PI * 2);
    ctx.fillStyle = this.color.replace('1)', alpha + ')');
    ctx.fill();
  }
}

class AmbientSpore {
  constructor() {
    this.reset();
  }
  reset() {
    this.x = Math.random() * canvas.width;
    this.y = canvas.height * 0.3 + Math.random() * canvas.height * 0.6;
    this.size = 1 + Math.random() * 2;
    this.speedX = (Math.random() - 0.5) * 0.3;
    this.speedY = -0.2 - Math.random() * 0.3;
    this.life = 200 + Math.random() * 300;
    this.maxLife = this.life;
    this.phase = Math.random() * Math.PI * 2;
    const colors = ['rgba(74,237,196,', 'rgba(74,237,106,', 'rgba(180,74,237,'];
    this.colorBase = colors[Math.floor(Math.random() * colors.length)];
  }
  update() {
    this.x += this.speedX + Math.sin(this.phase) * 0.15;
    this.y += this.speedY;
    this.phase += 0.02;
    this.life--;
    if (this.life <= 0 || this.y < 0) this.reset();
  }
  draw(ctx) {
    const alpha = Math.min(1, this.life / this.maxLife) * 0.4;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
    ctx.fillStyle = this.colorBase + alpha + ')';
    ctx.fill();
  }
}

// Init ambient spores
for (let i = 0; i < 30; i++) {
  ambientParticles.push(new AmbientSpore());
}

function spawnTapParticles(x, y) {
  const count = 8 + Math.floor(Math.random() * 6);
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 1 + Math.random() * 3;
    const colors = ['rgba(74,237,196,1)', 'rgba(45,212,191,1)', 'rgba(74,237,160,1)'];
    particles.push(new Particle(
      x, y,
      colors[Math.floor(Math.random() * colors.length)],
      2 + Math.random() * 3,
      Math.cos(angle) * speed,
      Math.sin(angle) * speed - 1,
      30 + Math.random() * 20
    ));
  }
}

function animateParticles() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // Ambient spores (more during later phases)
  const sporeCount = Math.min(60, 15 + state.phaseIndex * 10);
  while (ambientParticles.length < sporeCount) ambientParticles.push(new AmbientSpore());
  for (const s of ambientParticles) {
    s.update();
    s.draw(ctx);
  }

  // Tap particles
  particles = particles.filter(p => p.life > 0);
  for (const p of particles) {
    p.update();
    p.draw(ctx);
  }

  requestAnimationFrame(animateParticles);
}
animateParticles();

// ========== SVG ORGANISM GENERATION ==========
const svgNS = 'http://www.w3.org/2000/svg';
const orgGroup = document.getElementById('organisms');
let placedOrganisms = [];

function createSVGOrganism(species, x, y) {
  const g = document.createElementNS(svgNS, 'g');
  g.setAttribute('transform', `translate(${x},${y})`);
  g.style.opacity = '0';
  g.style.transition = 'opacity 1.5s ease-in';
  g.setAttribute('data-species', species.id);

  const scale = 0.6 + Math.random() * 0.5;

  switch(species.type) {
    case 'plant':
      drawPlant(g, species, scale);
      break;
    case 'fungus':
      drawFungus(g, species, scale);
      break;
    case 'microbe':
      drawMicrobe(g, species, scale);
      break;
    case 'creature':
      drawCreature(g, species, scale);
      break;
    case 'structure':
      drawStructure(g, species, scale);
      break;
    default:
      drawPlant(g, species, scale);
  }

  orgGroup.appendChild(g);
  requestAnimationFrame(() => { g.style.opacity = '1'; });

  // Gentle sway animation
  const swayAmount = 1 + Math.random() * 2;
  const swaySpeed = 3000 + Math.random() * 4000;
  let startTime = Date.now();

  function sway() {
    if (!g.parentNode) return;
    const t = (Date.now() - startTime) / swaySpeed;
    const offset = Math.sin(t * Math.PI * 2) * swayAmount;
    g.setAttribute('transform', `translate(${x + offset},${y})`);
    requestAnimationFrame(sway);
  }
  sway();

  return g;
}

function drawPlant(g, species, scale) {
  const color = species.phase === 'crisis' ? '#9b4aed' : species.phase === 'catastrophe' ? '#ed4a6a' : '#4aedc4';
  const colorDark = species.phase === 'crisis' ? '#6a2aad' : species.phase === 'catastrophe' ? '#ad2a4a' : '#2a9d84';

  // Stem
  const stemH = (30 + Math.random() * 40) * scale;
  const stem = document.createElementNS(svgNS, 'path');
  const curve = (Math.random() - 0.5) * 15;
  stem.setAttribute('d', `M0,0 Q${curve},${-stemH/2} ${curve*0.5},${-stemH}`);
  stem.setAttribute('stroke', colorDark);
  stem.setAttribute('stroke-width', (1.5 * scale).toString());
  stem.setAttribute('fill', 'none');
  stem.setAttribute('filter', 'url(#bio-glow)');
  g.appendChild(stem);

  // Leaves / fronds
  const leafCount = 2 + Math.floor(Math.random() * 4);
  for (let i = 0; i < leafCount; i++) {
    const ly = -stemH * (0.3 + i * 0.15);
    const side = i % 2 === 0 ? 1 : -1;
    const leafSize = (8 + Math.random() * 12) * scale;
    const leaf = document.createElementNS(svgNS, 'path');
    leaf.setAttribute('d', `M${curve*0.3},${ly} Q${side*leafSize + curve*0.3},${ly - leafSize*0.5} ${side*leafSize*0.7 + curve*0.3},${ly + leafSize*0.3}`);
    leaf.setAttribute('fill', color);
    leaf.setAttribute('opacity', (0.3 + Math.random() * 0.4).toString());
    leaf.setAttribute('filter', 'url(#bio-glow)');
    g.appendChild(leaf);
  }

  // Glow at top
  const topGlow = document.createElementNS(svgNS, 'circle');
  topGlow.setAttribute('cx', (curve*0.5).toString());
  topGlow.setAttribute('cy', (-stemH).toString());
  topGlow.setAttribute('r', (4 * scale).toString());
  topGlow.setAttribute('fill', color);
  topGlow.setAttribute('opacity', '0.3');
  topGlow.setAttribute('filter', 'url(#bio-glow-strong)');
  g.appendChild(topGlow);
}

function drawFungus(g, species, scale) {
  const colors = ['#4aed9e', '#6aed4a', '#edcf4a'];
  const color = colors[Math.floor(Math.random() * colors.length)];

  // Stalk
  const h = (15 + Math.random() * 20) * scale;
  const stalk = document.createElementNS(svgNS, 'rect');
  stalk.setAttribute('x', (-2 * scale).toString());
  stalk.setAttribute('y', (-h).toString());
  stalk.setAttribute('width', (4 * scale).toString());
  stalk.setAttribute('height', h.toString());
  stalk.setAttribute('rx', (2 * scale).toString());
  stalk.setAttribute('fill', '#1a3a2a');
  g.appendChild(stalk);

  // Cap
  const capW = (10 + Math.random() * 15) * scale;
  const cap = document.createElementNS(svgNS, 'ellipse');
  cap.setAttribute('cx', '0');
  cap.setAttribute('cy', (-h).toString());
  cap.setAttribute('rx', capW.toString());
  cap.setAttribute('ry', (capW * 0.5).toString());
  cap.setAttribute('fill', color);
  cap.setAttribute('opacity', '0.6');
  cap.setAttribute('filter', 'url(#bio-glow)');
  g.appendChild(cap);

  // Spots
  for (let i = 0; i < 3; i++) {
    const spot = document.createElementNS(svgNS, 'circle');
    spot.setAttribute('cx', ((Math.random() - 0.5) * capW).toString());
    spot.setAttribute('cy', (-h - (Math.random() - 0.5) * capW * 0.3).toString());
    spot.setAttribute('r', (1.5 * scale).toString());
    spot.setAttribute('fill', '#fff');
    spot.setAttribute('opacity', '0.15');
    g.appendChild(spot);
  }
}

function drawMicrobe(g, species, scale) {
  const size = (3 + Math.random() * 5) * scale;
  const count = 3 + Math.floor(Math.random() * 5);
  const color = '#4aedc4';

  for (let i = 0; i < count; i++) {
    const dx = (Math.random() - 0.5) * 20 * scale;
    const dy = (Math.random() - 0.5) * 20 * scale - 10;
    const c = document.createElementNS(svgNS, 'circle');
    c.setAttribute('cx', dx.toString());
    c.setAttribute('cy', dy.toString());
    c.setAttribute('r', (size * (0.5 + Math.random() * 0.5)).toString());
    c.setAttribute('fill', color);
    c.setAttribute('opacity', (0.15 + Math.random() * 0.25).toString());
    c.setAttribute('filter', 'url(#bio-glow)');
    g.appendChild(c);

    // Pulse animation
    const anim = document.createElementNS(svgNS, 'animate');
    anim.setAttribute('attributeName', 'opacity');
    anim.setAttribute('values', `${0.15 + Math.random()*0.2};${0.3 + Math.random()*0.2};${0.15 + Math.random()*0.2}`);
    anim.setAttribute('dur', (2 + Math.random() * 3) + 's');
    anim.setAttribute('repeatCount', 'indefinite');
    c.appendChild(anim);
  }
}

function drawCreature(g, species, scale) {
  const color = species.id === 'the_watcher' ? '#ed4a9e' : species.phase === 'crisis' ? '#ed7a4a' : '#4aedaa';
  const bodyW = (12 + Math.random() * 8) * scale;
  const bodyH = (8 + Math.random() * 6) * scale;

  // Body
  const body = document.createElementNS(svgNS, 'ellipse');
  body.setAttribute('cx', '0');
  body.setAttribute('cy', (-bodyH * 1.5).toString());
  body.setAttribute('rx', bodyW.toString());
  body.setAttribute('ry', bodyH.toString());
  body.setAttribute('fill', color);
  body.setAttribute('opacity', '0.5');
  body.setAttribute('filter', 'url(#bio-glow)');
  g.appendChild(body);

  // Eyes
  const eyeSpacing = bodyW * 0.4;
  for (let side = -1; side <= 1; side += 2) {
    const eye = document.createElementNS(svgNS, 'circle');
    eye.setAttribute('cx', (side * eyeSpacing).toString());
    eye.setAttribute('cy', (-bodyH * 1.7).toString());
    eye.setAttribute('r', (2.5 * scale).toString());
    eye.setAttribute('fill', '#fff');
    eye.setAttribute('opacity', '0.8');
    g.appendChild(eye);

    const pupil = document.createElementNS(svgNS, 'circle');
    pupil.setAttribute('cx', (side * eyeSpacing + 0.5).toString());
    pupil.setAttribute('cy', (-bodyH * 1.7).toString());
    pupil.setAttribute('r', (1.2 * scale).toString());
    pupil.setAttribute('fill', '#111');
    g.appendChild(pupil);
  }

  // Legs / appendages
  if (species.id !== 'nebula_jellyfish' && species.id !== 'the_watcher') {
    for (let i = 0; i < 3; i++) {
      for (let side = -1; side <= 1; side += 2) {
        const leg = document.createElementNS(svgNS, 'line');
        const lx = side * (bodyW * 0.3 + i * bodyW * 0.25);
        leg.setAttribute('x1', lx.toString());
        leg.setAttribute('y1', (-bodyH * 0.8).toString());
        leg.setAttribute('x2', (lx + side * 3 * scale).toString());
        leg.setAttribute('y2', '0');
        leg.setAttribute('stroke', color);
        leg.setAttribute('stroke-width', (0.8 * scale).toString());
        leg.setAttribute('opacity', '0.4');
        g.appendChild(leg);
      }
    }
  }

  // Jellyfish tentacles
  if (species.id === 'nebula_jellyfish') {
    for (let i = 0; i < 5; i++) {
      const tent = document.createElementNS(svgNS, 'path');
      const tx = (Math.random() - 0.5) * bodyW * 1.5;
      tent.setAttribute('d', `M${tx},${-bodyH*0.5} Q${tx + (Math.random()-0.5)*10},${bodyH} ${tx + (Math.random()-0.5)*15},${bodyH*2}`);
      tent.setAttribute('stroke', color);
      tent.setAttribute('stroke-width', (0.8 * scale).toString());
      tent.setAttribute('fill', 'none');
      tent.setAttribute('opacity', '0.3');
      tent.setAttribute('filter', 'url(#bio-glow)');
      g.appendChild(tent);
    }
    // Float it higher
    g.setAttribute('transform', `translate(${parseFloat(g.getAttribute('transform').match(/translate\(([^,]+)/)[1])},${parseFloat(g.getAttribute('transform').match(/,([^)]+)/)[1]) - 100})`);
  }

  // The Watcher - special eye
  if (species.id === 'the_watcher') {
    const bigEye = document.createElementNS(svgNS, 'circle');
    bigEye.setAttribute('cx', '0');
    bigEye.setAttribute('cy', (-bodyH * 2.5).toString());
    bigEye.setAttribute('r', (6 * scale).toString());
    bigEye.setAttribute('fill', '#ed4a9e');
    bigEye.setAttribute('opacity', '0.6');
    bigEye.setAttribute('filter', 'url(#bio-glow-strong)');
    g.appendChild(bigEye);

    const bigPupil = document.createElementNS(svgNS, 'circle');
    bigPupil.setAttribute('cx', '0');
    bigPupil.setAttribute('cy', (-bodyH * 2.5).toString());
    bigPupil.setAttribute('r', (3 * scale).toString());
    bigPupil.setAttribute('fill', '#1a0520');
    g.appendChild(bigPupil);
  }
}

function drawStructure(g, species, scale) {
  const h = (50 + Math.random() * 30) * scale;
  const w = (6 + Math.random() * 4) * scale;
  const color = '#b44aed';

  // Spire
  const spire = document.createElementNS(svgNS, 'path');
  spire.setAttribute('d', `M${-w},0 L${-w*0.3},${-h} L${w*0.3},${-h} L${w},0 Z`);
  spire.setAttribute('fill', color);
  spire.setAttribute('opacity', '0.4');
  spire.setAttribute('filter', 'url(#bio-glow-strong)');
  g.appendChild(spire);

  // Energy rings
  for (let i = 0; i < 4; i++) {
    const ry = -h * (0.2 + i * 0.2);
    const ring = document.createElementNS(svgNS, 'ellipse');
    ring.setAttribute('cx', '0');
    ring.setAttribute('cy', ry.toString());
    ring.setAttribute('rx', (w * (1.5 - i * 0.2)).toString());
    ring.setAttribute('ry', (2 * scale).toString());
    ring.setAttribute('fill', 'none');
    ring.setAttribute('stroke', '#ed4a9e');
    ring.setAttribute('stroke-width', (0.5 * scale).toString());
    ring.setAttribute('opacity', '0.3');
    g.appendChild(ring);

    const anim = document.createElementNS(svgNS, 'animate');
    anim.setAttribute('attributeName', 'opacity');
    anim.setAttribute('values', '0.2;0.5;0.2');
    anim.setAttribute('dur', (1.5 + i * 0.5) + 's');
    anim.setAttribute('repeatCount', 'indefinite');
    ring.appendChild(anim);
  }
}

function createSpeciesIcon(species, size) {
  const svg = document.createElementNS(svgNS, 'svg');
  svg.setAttribute('viewBox', '-30 -80 60 90');
  svg.setAttribute('width', size);
  svg.setAttribute('height', size);

  const g = document.createElementNS(svgNS, 'g');
  g.setAttribute('transform', 'translate(0,0)');
  const scale = 0.8;

  switch(species.type) {
    case 'plant': drawPlant(g, species, scale); break;
    case 'fungus': drawFungus(g, species, scale); break;
    case 'microbe': drawMicrobe(g, species, scale); break;
    case 'creature': drawCreature(g, species, scale); break;
    case 'structure': drawStructure(g, species, scale); break;
    default: drawPlant(g, species, scale);
  }

  svg.appendChild(g);
  return svg;
}

// ========== TAP HANDLING ==========
const tapZone = document.getElementById('tap-zone');

function handleTap(e) {
  e.preventDefault();
  if (!state.inLoop) return;

  // Calculate residue gain
  let gain = state.tapPower;
  const residueMult = 1 + (state.shopPurchases['residue_mult'] || 0) * 0.5;
  gain = Math.floor(gain * residueMult);

  state.residue += gain;
  state.totalResidue += gain;
  state.loopResidueCollected += gain;
  state.loopTaps++;

  // Visual feedback
  const rect = tapZone.getBoundingClientRect();
  const cx = rect.left + rect.width / 2;
  const cy = rect.top + rect.height / 2;

  // Floating number
  const floater = document.createElement('div');
  floater.className = 'tap-amount';
  floater.textContent = '+' + formatNumber(gain);
  floater.style.left = (cx - 20 + (Math.random() - 0.5) * 30) + 'px';
  floater.style.top = (cy - 20) + 'px';
  document.body.appendChild(floater);
  setTimeout(() => floater.remove(), 800);

  // Particles at touch point
  let px, py;
  if (e.touches) {
    px = e.touches[0].clientX;
    py = e.touches[0].clientY;
  } else {
    px = e.clientX;
    py = e.clientY;
  }
  spawnTapParticles(px, py);

  updateDisplay();
}

tapZone.addEventListener('touchstart', handleTap, { passive: false });
tapZone.addEventListener('mousedown', handleTap);

// ========== DISPLAY UPDATE ==========
function formatNumber(n) {
  if (n >= 1e6) return (n / 1e6).toFixed(1) + 'M';
  if (n >= 1e3) return (n / 1e3).toFixed(1) + 'K';
  return Math.floor(n).toString();
}

function updateDisplay() {
  document.getElementById('residue-display').textContent = formatNumber(state.residue);
  document.getElementById('species-display').textContent = state.speciesDiscovered.length;
  document.getElementById('loop-display').textContent = state.loopNumber;

  // Phase bar
  const segments = document.querySelectorAll('.phase-segment');
  segments.forEach((seg, i) => {
    seg.classList.remove('active', 'completed');
    if (i < state.phaseIndex) seg.classList.add('completed');
    if (i === state.phaseIndex) seg.classList.add('active');
  });

  const phaseName = PHASES[state.phaseIndex];
  const elapsed = Date.now() - state.phaseStartTime;
  const phaseDur = getPhaseDuration();
  const remaining = Math.max(0, Math.ceil((phaseDur - elapsed) / 1000));
  document.getElementById('phase-name').innerHTML = phaseName.charAt(0).toUpperCase() + phaseName.slice(1) +
    ` <span id="phase-timer">${remaining}s</span>`;

  // Fog overlay
  const fogOpacity = state.phaseIndex >= 3 ? (state.phaseIndex === 4 ? 0.5 : 0.2) : 0;
  document.getElementById('fog-overlay').style.setProperty('--fog-opacity', fogOpacity);
  document.getElementById('fog-overlay').style.background =
    `radial-gradient(ellipse at center, transparent 30%, rgba(100,20,140,${fogOpacity}) 100%)`;

  // Intervention lock
  const intBtn = document.getElementById('btn-intervene');
  if (state.loopNumber < 2) {
    intBtn.classList.add('locked');
  } else {
    intBtn.classList.remove('locked');
  }
}

function getPhaseDuration() {
  const bonus = (state.shopPurchases['phase_insight'] || 0) * 5000;
  return PHASE_DURATION + bonus;
}

// ========== PHASE PROGRESSION ==========
function progressPhase() {
  const elapsed = Date.now() - state.phaseStartTime;
  const phaseDur = getPhaseDuration();

  if (elapsed >= phaseDur && state.inLoop) {
    if (state.phaseIndex < PHASES.length - 1) {
      state.phaseIndex++;
      state.phaseStartTime = Date.now();
      onPhaseChange();
    } else {
      // Catastrophe complete — trigger loop reset
      triggerCatastrophe();
    }
  }
}

function onPhaseChange() {
  const phase = PHASES[state.phaseIndex];

  // Show phase quote
  const quotes = PHASE_QUOTES[phase];
  if (quotes) {
    showQuote(quotes[Math.floor(Math.random() * quotes.length)]);
  }

  // Ambient rumbling text during crisis/catastrophe
  if (phase === 'crisis' || phase === 'catastrophe') {
    showAmbientText();
  }

  // Screen shake on catastrophe
  if (phase === 'catastrophe') {
    document.body.classList.add('screen-shake');
    setTimeout(() => document.body.classList.remove('screen-shake'), 500);
  }

  updateDisplay();
}

function showAmbientText() {
  const texts = [
    'the fog remembers...', 'something stirs...', 'time bends...',
    'the loop closes...', 'they are watching...', 'it begins again...',
    'entropy rises...', 'the void hungers...', 'cycles within cycles...',
  ];
  const el = document.createElement('div');
  el.className = 'ambient-text';
  el.textContent = texts[Math.floor(Math.random() * texts.length)];
  el.style.left = (10 + Math.random() * 60) + '%';
  el.style.top = (20 + Math.random() * 50) + '%';
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 8000);
}

// ========== SPECIES DISCOVERY ==========
let discoveryTimer = 0;

function tryDiscoverSpecies() {
  const phase = PHASES[state.phaseIndex];
  if (!state.inLoop) return;

  // Base chance per tick (called every second)
  let chance = 0.08;
  const beaconBonus = (state.shopPurchases['species_magnet'] || 0) * 0.3;
  chance *= (1 + beaconBonus);

  // Higher chance in later phases
  chance += state.phaseIndex * 0.02;

  if (Math.random() < chance) {
    // Find eligible species for this phase
    const eligible = ALL_SPECIES.filter(s => {
      const phaseIdx = PHASES.indexOf(s.phase);
      return phaseIdx <= state.phaseIndex && !state.speciesDiscovered.includes(s.id);
    });

    if (eligible.length > 0) {
      // Weight by rarity (lower rarity = more common)
      const weighted = [];
      for (const s of eligible) {
        const weight = Math.max(1, 6 - s.rarity);
        for (let i = 0; i < weight; i++) weighted.push(s);
      }
      const species = weighted[Math.floor(Math.random() * weighted.length)];
      discoverSpecies(species);
    }
  }
}

function discoverSpecies(species, forced) {
  if (state.speciesDiscovered.includes(species.id) && !forced) return;

  state.speciesDiscovered.push(species.id);
  if (!state.allSpeciesEverDiscovered.includes(species.id)) {
    state.allSpeciesEverDiscovered.push(species.id);
  }
  state.loopSpeciesCount++;

  // Place organism in biome
  const x = 30 + Math.random() * 340;
  const y = 580 + Math.random() * 60;
  createSVGOrganism(species, x, y);
  placedOrganisms.push({ species, x, y });

  // Discovery popup
  showDiscoveryPopup(species);

  // Protagonist quote
  const quoteTemplate = DISCOVERY_QUOTES[Math.floor(Math.random() * DISCOVERY_QUOTES.length)];
  setTimeout(() => {
    showQuote(quoteTemplate.replace('{name}', species.name));
  }, 2500);

  // Residue bonus
  const bonus = species.rarity * 10 * state.tapPower;
  state.residue += bonus;
  state.totalResidue += bonus;
  state.loopResidueCollected += bonus;

  updateDisplay();
  saveState();
}

function showDiscoveryPopup(species) {
  const popup = document.createElement('div');
  popup.className = 'discovery-popup';

  const iconContainer = document.createElement('div');
  iconContainer.className = 'species-preview';
  iconContainer.appendChild(createSpeciesIcon(species, 80));

  popup.innerHTML = `<h3>Species Discovered!</h3>`;
  popup.appendChild(iconContainer);
  popup.innerHTML += `
    <div class="species-name">${species.name}</div>
    <div class="species-desc">${species.desc}</div>
    <button class="dismiss-btn" onclick="this.parentElement.remove()">Fascinating</button>
  `;

  // Re-attach icon since innerHTML wipes it
  const preview = popup.querySelector('.species-preview');
  if (!preview.hasChildNodes()) {
    preview.appendChild(createSpeciesIcon(species, 80));
  }

  document.body.appendChild(popup);

  // Auto-dismiss after 4s
  setTimeout(() => {
    if (popup.parentNode) popup.remove();
  }, 4000);
}

// ========== PROTAGONIST QUOTES ==========
let currentQuote = null;
let quoteTimeout = null;

function showQuote(text) {
  const bar = document.getElementById('quote-bar');

  // Fade out old
  if (currentQuote) {
    currentQuote.classList.add('fading');
    const old = currentQuote;
    setTimeout(() => old.remove(), 400);
  }

  if (quoteTimeout) clearTimeout(quoteTimeout);

  const bubble = document.createElement('div');
  bubble.className = 'quote-bubble';
  bubble.innerHTML = `<span class="speaker">You</span>${text}`;
  bar.appendChild(bubble);
  currentQuote = bubble;

  quoteTimeout = setTimeout(() => {
    if (bubble.parentNode) {
      bubble.classList.add('fading');
      setTimeout(() => bubble.remove(), 400);
      currentQuote = null;
    }
  }, 5000);
}

// ========== CATASTROPHE & LOOP RESET ==========
function triggerCatastrophe() {
  state.inLoop = false;

  // Flash
  const flash = document.createElement('div');
  flash.className = 'catastrophe-flash';
  document.body.appendChild(flash);
  setTimeout(() => flash.remove(), 1500);

  // Screen shake
  document.body.classList.add('screen-shake');
  setTimeout(() => document.body.classList.remove('screen-shake'), 500);

  // Wait then show summary
  setTimeout(() => {
    showLoopSummary();
  }, 2000);
}

function showLoopSummary() {
  const knowledge = LOOP_KNOWLEDGE[Math.min(state.loopNumber - 1, LOOP_KNOWLEDGE.length - 1)];

  const summary = document.createElement('div');
  summary.id = 'loop-summary';
  summary.innerHTML = `
    <h1>Catastrophe</h1>
    <div class="summary-subtitle">Loop #${state.loopNumber} has ended</div>
    <div class="summary-stats">
      <div class="summary-stat"><span class="s-label">Species Discovered</span><span class="s-value">${state.loopSpeciesCount}</span></div>
      <div class="summary-stat"><span class="s-label">Temporal Residue Collected</span><span class="s-value">${formatNumber(state.loopResidueCollected)}</span></div>
      <div class="summary-stat"><span class="s-label">Taps</span><span class="s-value">${state.loopTaps}</span></div>
      <div class="summary-stat"><span class="s-label">Highest Phase</span><span class="s-value">${PHASES[state.phaseIndex].charAt(0).toUpperCase() + PHASES[state.phaseIndex].slice(1)}</span></div>
      <div class="summary-stat"><span class="s-label">Codex Progress</span><span class="s-value">${state.allSpeciesEverDiscovered.length} / ${ALL_SPECIES.length}</span></div>
    </div>
    <div class="summary-knowledge">
      <h3>Knowledge Retained</h3>
      <p>"${knowledge}"</p>
    </div>
    <button class="continue-btn" onclick="startNewLoop()">Enter Loop #${state.loopNumber + 1}</button>
  `;

  document.body.appendChild(summary);
}

function startNewLoop() {
  // Remove summary
  const summary = document.getElementById('loop-summary');
  if (summary) summary.remove();

  // Increment loop
  state.loopNumber++;
  state.phaseIndex = 0;
  state.phaseStartTime = Date.now();
  state.speciesDiscovered = [];
  state.loopSpeciesCount = 0;
  state.loopResidueCollected = 0;
  state.loopTaps = 0;
  state.inLoop = true;
  state.interventionsCooldown = {};

  // Clear biome
  orgGroup.innerHTML = '';
  placedOrganisms = [];

  // Phase quote
  const quotes = PHASE_QUOTES.primordial;
  showQuote(quotes[Math.floor(Math.random() * quotes.length)]);

  updateDisplay();
  saveState();
}

// ========== AUTO-GENERATION ==========
function autoGenerate() {
  if (!state.inLoop) return;
  if (state.autoGen > 0) {
    const residueMult = 1 + (state.shopPurchases['residue_mult'] || 0) * 0.5;
    const gain = Math.floor(state.autoGen * residueMult);
    state.residue += gain;
    state.totalResidue += gain;
    state.loopResidueCollected += gain;
  }
}

// ========== AUTO-SPAWN ORGANISMS ==========
function autoSpawnOrganisms() {
  if (!state.inLoop) return;

  // Spawn background organisms (already discovered species) to fill the biome
  const phase = PHASES[state.phaseIndex];
  const eligible = ALL_SPECIES.filter(s => {
    const phaseIdx = PHASES.indexOf(s.phase);
    return phaseIdx <= state.phaseIndex && state.speciesDiscovered.includes(s.id);
  });

  if (eligible.length > 0 && placedOrganisms.length < 25 + state.phaseIndex * 8) {
    if (Math.random() < 0.3) {
      const species = eligible[Math.floor(Math.random() * eligible.length)];
      const x = 20 + Math.random() * 360;
      const y = 560 + Math.random() * 80;
      createSVGOrganism(species, x, y);
      placedOrganisms.push({ species, x, y });
    }
  }
}

// ========== MARKETPLACE ==========
function openMarket() {
  closeAllModals();

  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.onclick = (e) => { if (e.target === overlay) overlay.remove(); };

  const sheet = document.createElement('div');
  sheet.className = 'modal-sheet';

  let itemsHTML = '<div class="modal-handle"></div><div class="modal-header"><h2>Temporal Market</h2><div class="modal-subtitle">Spend residue to strengthen future loops</div></div>';

  itemsHTML += '<div class="section-label">Upgrades</div>';
  for (const item of SHOP_ITEMS.filter(i => i.category === 'upgrade')) {
    const owned = state.shopPurchases[item.id] || 0;
    const cost = Math.floor(item.cost * Math.pow(item.costScale, owned));
    const maxed = owned >= item.max;
    const canAfford = state.residue >= cost && !maxed;

    itemsHTML += `
      <div class="shop-item ${!canAfford ? 'cant-afford' : ''}" onclick="buyItem('${item.id}')" data-item="${item.id}">
        <div class="item-icon" style="background:rgba(74,237,196,0.1);color:var(--glow-teal);">&#x2728;</div>
        <div class="item-info">
          <div class="item-name">${item.name}</div>
          <div class="item-desc">${item.desc}</div>
        </div>
        ${maxed ? '<div class="item-owned">MAX</div>' :
          `<div class="item-cost">${formatNumber(cost)} TR</div>`}
      </div>`;
  }

  itemsHTML += '<div class="section-label">Echoes</div>';
  for (const item of SHOP_ITEMS.filter(i => i.category === 'echo')) {
    const owned = state.shopPurchases[item.id] || 0;
    const cost = Math.floor(item.cost * Math.pow(item.costScale, owned));
    const maxed = owned >= item.max;
    const canAfford = state.residue >= cost && !maxed;

    itemsHTML += `
      <div class="shop-item ${!canAfford ? 'cant-afford' : ''}" onclick="buyItem('${item.id}')" data-item="${item.id}">
        <div class="item-icon" style="background:rgba(180,74,237,0.1);color:var(--glow-purple);">&#x1F300;</div>
        <div class="item-info">
          <div class="item-name">${item.name}</div>
          <div class="item-desc">${item.desc}${owned > 0 ? ` (owned: ${owned})` : ''}</div>
        </div>
        ${maxed ? '<div class="item-owned">MAX</div>' :
          `<div class="item-cost">${formatNumber(cost)} TR</div>`}
      </div>`;
  }

  sheet.innerHTML = itemsHTML;
  overlay.appendChild(sheet);
  document.body.appendChild(overlay);
}

function buyItem(itemId) {
  const item = SHOP_ITEMS.find(i => i.id === itemId);
  if (!item) return;

  const owned = state.shopPurchases[item.id] || 0;
  if (owned >= item.max) return;

  const cost = Math.floor(item.cost * Math.pow(item.costScale, owned));
  if (state.residue < cost) return;

  state.residue -= cost;
  state.shopPurchases[item.id] = owned + 1;
  item.effect();

  // Toast
  showToast(`Acquired: ${item.name}`);

  // Refresh market
  closeAllModals();
  openMarket();
  updateDisplay();
  saveState();
}

  const sheet = document.createElement('div');
  sheet.className = 'modal-sheet';

  let html = '<div class="modal-handle"></div><div class="modal-header"><h2>Interventions</h2><div class="modal-subtitle">Spend residue to influence the current loop</div></div>';
  html += '<div class="intervention-list">';

  for (const int of INTERVENTIONS) {
    const cdEnd = state.interventionsCooldown[int.id] || 0;
    const onCooldown = Date.now() < cdEnd;
    const canAfford = state.residue >= int.cost;
    const cdRemaining = onCooldown ? Math.ceil((cdEnd - Date.now()) / 1000) : 0;

    html += `
      <div class="intervention-btn ${onCooldown ? 'on-cooldown' : ''} ${!canAfford && !onCooldown ? 'cant-afford' : ''}" onclick="useIntervention('${int.id}')">
        <div class="int-icon">${int.icon}</div>
        <div class="int-info">
          <div class="int-name">${int.name}</div>
          <div class="int-desc">${int.desc}${onCooldown ? ` (${cdRemaining}s)` : ''}</div>
        </div>
        <div class="int-cost">${int.cost} TR</div>
      </div>`;
  }

  html += '</div>';
  sheet.innerHTML = html;
  overlay.appendChild(sheet);
  document.body.appendChild(overlay);
}

function useIntervention(intId) {
  const int = INTERVENTIONS.find(i => i.id === intId);
  if (!int) return;

  const cdEnd = state.interventionsCooldown[int.id] || 0;
  if (Date.now() < cdEnd) return;
  if (state.residue < int.cost) return;

  state.residue -= int.cost;
  state.interventionsCooldown[int.id] = Date.now() + int.cooldown;

  switch(intId) {
    case 'nurture':
      showToast('Nurture Pulse activated! Growth enhanced.');
      showQuote("I channeled... something. The plants seem grateful? Do plants feel gratitude?");
      // Visual: flash all organisms
      const orgs = orgGroup.querySelectorAll('g');
      orgs.forEach(o => {
        o.style.transition = 'filter 0.5s';
        o.style.filter = 'brightness(2) drop-shadow(0 0 8px #4aedc4)';
        setTimeout(() => { o.style.filter = ''; }, 2000);
      });
      // Bonus residue
      const bonus = 20 * state.tapPower;
      state.residue += bonus;
      state.totalResidue += bonus;
      state.loopResidueCollected += bonus;
      break;

    case 'stabilize':
      showToast('Temporal Anchor deployed! Fog slowed.');
      showQuote("I'm holding time still. My nose is bleeding. Worth it.");
      // Extend current phase
      state.phaseStartTime += 6000;
      break;

    case 'catalyst':
      showToast('Species Catalyst used!');
      showQuote("I forced evolution. That can't be ethical.");
      // Force discover
      const eligible = ALL_SPECIES.filter(s => {
        const phaseIdx = PHASES.indexOf(s.phase);
        return phaseIdx <= state.phaseIndex && !state.speciesDiscovered.includes(s.id);
      });
      if (eligible.length > 0) {
        const species = eligible[Math.floor(Math.random() * eligible.length)];
        discoverSpecies(species, true);
      } else {
        showToast('No new species available this phase.');
        // Refund
        state.residue += int.cost;
      }
      break;
  }

  closeAllModals();
  updateDisplay();
  saveState();
}

// ========== UTILITIES ==========
function closeAllModals() {
  document.querySelectorAll('.modal-overlay').forEach(m => m.remove());
}

function showToast(text) {
  const toast = document.createElement('div');
  toast.className = 'toast';
  toast.textContent = text;
  document.body.appendChild(toast);
  setTimeout(() => toast.remove(), 2500);
}

// ========== IDLE QUOTES ==========
let idleQuoteTimer = 0;

function tryIdleQuote() {
  idleQuoteTimer++;
  if (idleQuoteTimer >= 15 && state.inLoop) { // every ~15 seconds
    idleQuoteTimer = 0;
    if (Math.random() < 0.4) {
      const loopQuotes = [
        ...IDLE_QUOTES,
        `Loop #${state.loopNumber}. I'm starting to remember things. Mostly that everything dies.`,
        `${state.speciesDiscovered.length} species so far. Each one weirder than the last.`,
      ];
      showQuote(loopQuotes[Math.floor(Math.random() * loopQuotes.length)]);
    }
  }
}

// ========== MAIN GAME LOOP ==========
let lastTick = Date.now();

function gameTick() {
  const now = Date.now();
  const dt = now - lastTick;
  lastTick = now;

  if (state.inLoop) {
    progressPhase();
    autoGenerate();
    tryDiscoverSpecies();
    autoSpawnOrganisms();
    tryIdleQuote();
    updateDisplay();
  }

  // Auto-save every 10 seconds
  if (now % 10000 < 1100) saveState();
}

// Run game tick every second
setInterval(gameTick, 1000);

// ========== STARTUP ==========
function init() {
  loadState();

  // Check if returning from idle
  if (state.lastTimestamp) {
    const idleSeconds = Math.floor((Date.now() - state.lastTimestamp) / 1000);
    if (idleSeconds > 30 && state.autoGen > 0) {
      // Cap idle earnings at 1 hour
      const cappedSeconds = Math.min(idleSeconds, 3600);
      const idleEarnings = Math.floor(state.autoGen * cappedSeconds);
      if (idleEarnings > 0) {
        state.residue += idleEarnings;
        state.totalResidue += idleEarnings;
        setTimeout(() => {
          showToast(`Welcome back! Earned ${formatNumber(idleEarnings)} TR while away.`);
        }, 1000);
      }
    }
  }

  // Show initial quote
  if (state.loopNumber === 1 && state.speciesDiscovered.length === 0) {
    showQuote("I woke up here again. The ferns are back. I don't understand ferns.");
  } else {
    const phase = PHASES[state.phaseIndex];
    const quotes = PHASE_QUOTES[phase];
    if (quotes) showQuote(quotes[Math.floor(Math.random() * quotes.length)]);
  }

  // Re-populate biome from current species
  for (const sid of state.speciesDiscovered) {
    const species = ALL_SPECIES.find(s => s.id === sid);
    if (species) {
      const count = 1 + Math.floor(Math.random() * 3);
      for (let i = 0; i < count; i++) {
        const x = 20 + Math.random() * 360;
        const y = 555 + Math.random() * 85;
        createSVGOrganism(species, x, y);
        placedOrganisms.push({ species, x, y });
      }
    }
  }

  updateDisplay();
}

init();
</script>
