<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
<title>Temporal Echoes - The Rapid Cycle</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg-deep: #0a0e1a;
  --bg-panel: #0f1525;
  --bg-card: #141b2d;
  --border: #1e2a45;
  --text: #c8d6e5;
  --text-dim: #576574;
  --glow-green: #00ff88;
  --glow-teal: #00e5ff;
  --glow-purple: #b388ff;
  --glow-amber: #ffab40;
  --glow-pink: #ff4081;
  --glow-blue: #448aff;
  --marsh: #4caf50;
  --cavern: #9c27b0;
  --canopy: #2e7d32;
  --thermal: #ff5722;
}

html, body {
  height: 100%;
  overflow: hidden;
  font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
  background: var(--bg-deep);
  color: var(--text);
  touch-action: manipulation;
  -webkit-tap-highlight-color: transparent;
  user-select: none;
}

body { display: flex; flex-direction: column; }

.glow-green { color: var(--glow-green); text-shadow: 0 0 8px var(--glow-green), 0 0 20px rgba(0,255,136,0.3); }
.glow-teal { color: var(--glow-teal); text-shadow: 0 0 8px var(--glow-teal), 0 0 20px rgba(0,229,255,0.3); }
.glow-purple { color: var(--glow-purple); text-shadow: 0 0 8px var(--glow-purple), 0 0 20px rgba(179,136,255,0.3); }
.glow-amber { color: var(--glow-amber); text-shadow: 0 0 8px var(--glow-amber), 0 0 20px rgba(255,171,64,0.3); }
.glow-pink { color: var(--glow-pink); text-shadow: 0 0 8px var(--glow-pink), 0 0 20px rgba(255,64,129,0.3); }

/* Header bar */
#header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 6px 12px;
  background: var(--bg-panel);
  border-bottom: 1px solid var(--border);
  z-index: 100;
  flex-shrink: 0;
}

#header .title {
  font-size: 14px;
  font-weight: 700;
  color: var(--glow-teal);
  text-shadow: 0 0 10px rgba(0,229,255,0.4);
}

#header .stats {
  display: flex;
  gap: 12px;
  font-size: 11px;
}

#header .stat-val {
  font-weight: 700;
}

/* Timer bar */
#timer-bar-container {
  height: 4px;
  background: var(--bg-panel);
  flex-shrink: 0;
  position: relative;
}

#timer-bar {
  height: 100%;
  background: linear-gradient(90deg, var(--glow-teal), var(--glow-green));
  transition: width 0.5s linear;
  box-shadow: 0 0 8px var(--glow-teal);
}

#timer-text {
  position: absolute;
  right: 8px;
  top: -1px;
  font-size: 10px;
  color: var(--glow-teal);
  text-shadow: 0 0 6px var(--glow-teal);
  line-height: 4px;
}

/* Main game area */
#game-area {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  position: relative;
}

/* Biome SVG view */
#biome-view {
  flex: 1;
  position: relative;
  overflow: hidden;
  min-height: 0;
}

#biome-svg {
  width: 100%;
  height: 100%;
  display: block;
}

#particle-canvas {
  position: absolute;
  top: 0; left: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
}

/* Tap overlay */
#tap-zone {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 50%;
  cursor: pointer;
  z-index: 10;
}

.tap-ripple {
  position: absolute;
  width: 60px; height: 60px;
  border-radius: 50%;
  border: 2px solid var(--glow-green);
  animation: ripple 0.6s ease-out forwards;
  pointer-events: none;
}

@keyframes ripple {
  0% { transform: scale(0.3); opacity: 1; }
  100% { transform: scale(2); opacity: 0; }
}

.float-text {
  position: absolute;
  font-size: 16px;
  font-weight: 700;
  color: var(--glow-green);
  text-shadow: 0 0 8px var(--glow-green);
  pointer-events: none;
  animation: floatUp 1s ease-out forwards;
  z-index: 20;
}

@keyframes floatUp {
  0% { transform: translateY(0) scale(1); opacity: 1; }
  100% { transform: translateY(-60px) scale(0.7); opacity: 0; }
}

/* Protagonist quote */
#quote-bar {
  padding: 6px 12px;
  background: var(--bg-panel);
  border-top: 1px solid var(--border);
  font-size: 12px;
  font-style: italic;
  color: var(--text-dim);
  min-height: 32px;
  display: flex;
  align-items: center;
  flex-shrink: 0;
  transition: opacity 0.3s;
}

/* Bottom tabs */
#bottom-tabs {
  display: flex;
  background: var(--bg-panel);
  border-top: 1px solid var(--border);
  flex-shrink: 0;
}

#bottom-tabs button {
  flex: 1;
  padding: 8px 4px;
  background: none;
  border: none;
  color: var(--text-dim);
  font-size: 10px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 2px;
}

#bottom-tabs button.active {
  color: var(--glow-teal);
  text-shadow: 0 0 8px rgba(0,229,255,0.4);
}

#bottom-tabs button .tab-icon {
  font-size: 16px;
}

/* Panels (overlay) */
.panel-overlay {
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(10,14,26,0.95);
  z-index: 50;
  display: none;
  flex-direction: column;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
}

.panel-overlay.active {
  display: flex;
}

.panel-header {
  padding: 12px;
  font-size: 16px;
  font-weight: 700;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}

.panel-content {
  padding: 12px;
  flex: 1;
  overflow-y: auto;
}

/* Codex panel */
.codex-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(90px, 1fr));
  gap: 8px;
}

.codex-entry {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 8px;
  text-align: center;
  font-size: 10px;
  transition: all 0.3s;
}

.codex-entry.new {
  border-color: var(--glow-green);
  box-shadow: 0 0 12px rgba(0,255,136,0.2);
  animation: pulseNew 1s ease-in-out;
}

@keyframes pulseNew {
  0%, 100% { box-shadow: 0 0 12px rgba(0,255,136,0.2); }
  50% { box-shadow: 0 0 24px rgba(0,255,136,0.5); }
}

.codex-entry svg {
  width: 50px;
  height: 50px;
  margin: 0 auto 4px;
  display: block;
}

.codex-entry .species-name {
  font-weight: 600;
  color: var(--glow-teal);
  font-size: 9px;
  word-break: break-word;
}

/* Combine panel */
.combine-slots {
  display: flex;
  gap: 12px;
  justify-content: center;
  align-items: center;
  margin-bottom: 16px;
}

.combine-slot {
  width: 80px;
  height: 80px;
  background: var(--bg-card);
  border: 2px dashed var(--border);
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 11px;
  color: var(--text-dim);
  cursor: pointer;
  transition: all 0.2s;
  flex-direction: column;
}

.combine-slot.filled {
  border-style: solid;
  border-color: var(--glow-purple);
}

.combine-plus {
  font-size: 24px;
  color: var(--text-dim);
}

#combine-btn {
  display: block;
  margin: 0 auto 16px;
  padding: 10px 32px;
  background: linear-gradient(135deg, var(--glow-purple), var(--glow-teal));
  border: none;
  border-radius: 20px;
  color: #fff;
  font-weight: 700;
  font-size: 14px;
  cursor: pointer;
  opacity: 0.4;
  transition: all 0.3s;
}

#combine-btn.ready {
  opacity: 1;
  box-shadow: 0 0 16px rgba(179,136,255,0.4);
}

.combine-species-list {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(70px, 1fr));
  gap: 6px;
}

.combine-pick {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 6px;
  text-align: center;
  font-size: 9px;
  cursor: pointer;
  transition: all 0.2s;
}

.combine-pick:active {
  transform: scale(0.95);
  border-color: var(--glow-purple);
}

.combine-pick svg {
  width: 40px;
  height: 40px;
  margin: 0 auto 2px;
  display: block;
}

/* Marketplace panel */
.market-item {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 12px;
  margin-bottom: 8px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.market-info h3 {
  font-size: 13px;
  margin-bottom: 2px;
}

.market-info p {
  font-size: 10px;
  color: var(--text-dim);
}

.market-buy {
  padding: 6px 16px;
  background: var(--glow-teal);
  color: var(--bg-deep);
  border: none;
  border-radius: 12px;
  font-weight: 700;
  font-size: 11px;
  cursor: pointer;
  white-space: nowrap;
  transition: all 0.2s;
}

.market-buy:active {
  transform: scale(0.95);
}

.market-buy:disabled {
  opacity: 0.3;
  cursor: default;
}

/* Achievements panel */
.achievement-item {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 10px 12px;
  margin-bottom: 6px;
  display: flex;
  align-items: center;
  gap: 10px;
}

.achievement-item.locked {
  opacity: 0.35;
}

.ach-icon {
  font-size: 20px;
  flex-shrink: 0;
}

.ach-info h3 {
  font-size: 12px;
  margin-bottom: 1px;
}

.ach-info p {
  font-size: 10px;
  color: var(--text-dim);
}

/* Achievement toast */
.toast {
  position: fixed;
  top: 50px;
  left: 50%;
  transform: translateX(-50%) translateY(-20px);
  background: linear-gradient(135deg, rgba(20,27,45,0.97), rgba(30,42,69,0.97));
  border: 1px solid var(--glow-amber);
  border-radius: 12px;
  padding: 10px 20px;
  z-index: 200;
  text-align: center;
  box-shadow: 0 0 30px rgba(255,171,64,0.3);
  animation: toastIn 0.4s ease-out forwards;
  pointer-events: none;
  max-width: 85vw;
}

.toast .toast-title {
  font-size: 10px;
  color: var(--glow-amber);
  text-transform: uppercase;
  letter-spacing: 1px;
}

.toast .toast-name {
  font-size: 15px;
  font-weight: 700;
  color: #fff;
  text-shadow: 0 0 10px var(--glow-amber);
}

@keyframes toastIn {
  0% { opacity: 0; transform: translateX(-50%) translateY(-20px) scale(0.8); }
  100% { opacity: 1; transform: translateX(-50%) translateY(0) scale(1); }
}

@keyframes toastOut {
  0% { opacity: 1; transform: translateX(-50%) translateY(0); }
  100% { opacity: 0; transform: translateX(-50%) translateY(-30px); }
}

/* Species discovery toast */
.species-toast {
  position: fixed;
  top: 80px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(20,27,45,0.95);
  border: 1px solid var(--glow-green);
  border-radius: 10px;
  padding: 8px 16px;
  z-index: 190;
  display: flex;
  align-items: center;
  gap: 10px;
  box-shadow: 0 0 20px rgba(0,255,136,0.2);
  animation: toastIn 0.3s ease-out forwards;
  pointer-events: none;
}

.species-toast svg {
  width: 36px;
  height: 36px;
  flex-shrink: 0;
}

.species-toast .st-name {
  font-size: 13px;
  font-weight: 700;
  color: var(--glow-green);
  text-shadow: 0 0 8px rgba(0,255,136,0.4);
}

.species-toast .st-type {
  font-size: 9px;
  color: var(--text-dim);
}

/* Loop end / biome select screens */
#screen-overlay {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(10,14,26,0.97);
  z-index: 300;
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 24px;
  overflow-y: auto;
}

#screen-overlay.active {
  display: flex;
}

.screen-title {
  font-size: 22px;
  font-weight: 700;
  margin-bottom: 4px;
}

.screen-subtitle {
  font-size: 13px;
  color: var(--text-dim);
  margin-bottom: 20px;
  text-align: center;
}

/* Loop summary */
.loop-summary {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 16px;
  margin-bottom: 20px;
  width: 100%;
  max-width: 320px;
}

.loop-stat {
  display: flex;
  justify-content: space-between;
  padding: 4px 0;
  font-size: 13px;
}

.loop-stat .ls-val {
  font-weight: 700;
}

/* Biome cards */
.biome-cards {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  width: 100%;
  max-width: 320px;
  margin-bottom: 16px;
}

.biome-card {
  background: var(--bg-card);
  border: 2px solid var(--border);
  border-radius: 12px;
  padding: 14px 10px;
  text-align: center;
  cursor: pointer;
  transition: all 0.2s;
}

.biome-card:active {
  transform: scale(0.96);
}

.biome-card.locked {
  opacity: 0.3;
  pointer-events: none;
}

.biome-card .bc-icon {
  font-size: 28px;
  margin-bottom: 4px;
}

.biome-card .bc-name {
  font-size: 14px;
  font-weight: 700;
}

.biome-card .bc-desc {
  font-size: 9px;
  color: var(--text-dim);
  margin-top: 2px;
}

.biome-card .bc-lock {
  font-size: 9px;
  color: var(--glow-amber);
  margin-top: 4px;
}

.biome-card[data-biome="marsh"] { border-color: var(--marsh); }
.biome-card[data-biome="cavern"]:not(.locked) { border-color: var(--cavern); }
.biome-card[data-biome="canopy"]:not(.locked) { border-color: var(--canopy); }
.biome-card[data-biome="thermal"]:not(.locked) { border-color: var(--thermal); }

/* Marketplace in loop end */
.loop-market {
  width: 100%;
  max-width: 320px;
  margin-bottom: 16px;
}

.loop-market h3 {
  font-size: 14px;
  margin-bottom: 8px;
  color: var(--glow-amber);
  text-shadow: 0 0 8px rgba(255,171,64,0.3);
}

/* Continue button */
.btn-continue {
  padding: 12px 40px;
  background: linear-gradient(135deg, var(--glow-teal), var(--glow-green));
  border: none;
  border-radius: 24px;
  color: var(--bg-deep);
  font-weight: 800;
  font-size: 16px;
  cursor: pointer;
  box-shadow: 0 0 20px rgba(0,229,255,0.3);
  transition: all 0.2s;
  margin-top: 8px;
}

.btn-continue:active {
  transform: scale(0.95);
}

/* Reset button */
.btn-reset {
  margin-top: 12px;
  padding: 6px 16px;
  background: none;
  border: 1px solid var(--text-dim);
  border-radius: 12px;
  color: var(--text-dim);
  font-size: 10px;
  cursor: pointer;
}

/* Scrollbar styling */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

/* Discovery flash */
@keyframes discoveryFlash {
  0% { background: rgba(0,255,136,0.15); }
  100% { background: transparent; }
}

.discovery-flash {
  animation: discoveryFlash 0.5s ease-out;
}

/* Combination result popup */
#combo-result {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  background: var(--bg-card);
  border: 2px solid var(--glow-purple);
  border-radius: 16px;
  padding: 24px;
  z-index: 250;
  text-align: center;
  box-shadow: 0 0 40px rgba(179,136,255,0.4);
  display: none;
  max-width: 280px;
  width: 85vw;
}

#combo-result.active { display: block; }

#combo-result .cr-title {
  font-size: 11px;
  color: var(--glow-purple);
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 8px;
}

#combo-result .cr-name {
  font-size: 18px;
  font-weight: 700;
  color: #fff;
  text-shadow: 0 0 12px var(--glow-purple);
  margin-bottom: 4px;
}

#combo-result .cr-desc {
  font-size: 11px;
  color: var(--text-dim);
  margin-bottom: 12px;
}

#combo-result svg {
  width: 80px;
  height: 80px;
  margin: 0 auto 12px;
  display: block;
}

#combo-result button {
  padding: 8px 24px;
  background: var(--glow-purple);
  border: none;
  border-radius: 16px;
  color: #fff;
  font-weight: 700;
  cursor: pointer;
}
</style>
</head>
<body>

<!-- Header -->
<div id="header">
  <div class="title">TEMPORAL ECHOES</div>
  <div class="stats">
    <span><span class="glow-green stat-val" id="hd-residue">0</span> TR</span>
    <span><span class="glow-teal stat-val" id="hd-species">0</span> sp</span>
    <span><span class="glow-purple stat-val" id="hd-loops">0</span> lp</span>
  </div>
</div>

<!-- Timer bar -->
<div id="timer-bar-container">
  <div id="timer-bar" style="width:100%"></div>
  <div id="timer-text"></div>
</div>

<!-- Main game area -->
<div id="game-area">
  <!-- Biome SVG -->
  <div id="biome-view">
    <svg id="biome-svg" xmlns="http://www.w3.org/2000/svg"></svg>
    <canvas id="particle-canvas"></canvas>
    <div id="tap-zone"></div>
  </div>

  <!-- Protagonist quote -->
  <div id="quote-bar">"...where am I? Why is everything glowing?"</div>

  <!-- Panel overlays (inside game-area) -->
  <div class="panel-overlay" id="panel-codex">
    <div class="panel-header glow-teal">Codex <span id="codex-count" style="font-size:12px;color:var(--text-dim)"></span></div>
    <div class="panel-content"><div class="codex-grid" id="codex-grid"></div></div>
  </div>

  <div class="panel-overlay" id="panel-combine">
    <div class="panel-header glow-purple">Combination Lab</div>
    <div class="panel-content">
      <div class="combine-slots">
        <div class="combine-slot" id="slot-a" onclick="game.clearSlot(0)"><span>Tap to<br>select</span></div>
        <div class="combine-plus">+</div>
        <div class="combine-slot" id="slot-b" onclick="game.clearSlot(1)"><span>Tap to<br>select</span></div>
      </div>
      <button id="combine-btn" onclick="game.doCombine()">COMBINE</button>
      <div class="combine-species-list" id="combine-list"></div>
    </div>
  </div>

  <div class="panel-overlay" id="panel-market">
    <div class="panel-header glow-amber">Marketplace</div>
    <div class="panel-content" id="market-content"></div>
  </div>

  <div class="panel-overlay" id="panel-achievements">
    <div class="panel-header glow-pink">Achievements</div>
    <div class="panel-content" id="ach-content"></div>
  </div>
</div>

<!-- Bottom tabs -->
<div id="bottom-tabs">
  <button class="active" onclick="game.switchTab('biome')"><span class="tab-icon">&#127793;</span>Biome</button>
  <button onclick="game.switchTab('codex')"><span class="tab-icon">&#128214;</span>Codex</button>
  <button onclick="game.switchTab('combine')"><span class="tab-icon">&#9878;</span>Combine</button>
  <button onclick="game.switchTab('market')"><span class="tab-icon">&#128176;</span>Market</button>
  <button onclick="game.switchTab('achievements')"><span class="tab-icon">&#127942;</span>Achieve</button>
</div>

<!-- Loop end / biome select overlay -->
<div id="screen-overlay">
  <div id="screen-content"></div>
</div>

<!-- Combination result popup -->
<div id="combo-result">
  <div class="cr-title">New Combination!</div>
  <div id="cr-svg-holder"></div>
  <div class="cr-name" id="cr-name"></div>
  <div class="cr-desc" id="cr-desc"></div>
  <button onclick="game.closeComboResult()">Nice!</button>
</div>

<script>
// ============================================================
// GAME ENGINE
// ============================================================
const game = {
  // State
  residue: 0,
  totalResidue: 0,
  loops: 0,
  currentBiome: null,
  loopTime: 75, // seconds per loop
  loopTimer: 75,
  loopActive: false,
  discoveredSpecies: [],   // all discovered across all loops (global codex)
  currentLoopSpecies: [],  // species discovered THIS loop
  combinations: [],        // {a, b, result}
  combinationResults: [],  // just result species names
  achievements: [],
  unlockedBiomes: ['marsh'],
  residueMultiplier: 1,
  discoverySpeed: 1,
  comboBonus: 0,
  tapPower: 1,
  autoCollect: 0,
  selectedBiome: null,
  combineSlots: [null, null],
  activeTab: 'biome',
  speciesSpawnTimer: 0,
  nextSpeciesTime: 8,
  biomeSpeciesPool: [],
  loopSpeciesFound: 0,
  loopResidueEarned: 0,
  loopCombosFound: 0,
  marketItems: [],
  particles: [],
  biomeEntities: [],
  quoteTimer: 0,

  // Biome definitions
  biomes: {
    marsh: {

  // ---- SVG Generation ----
  generateSpeciesSVG(species, size = 50) {
    const seed = this.hashStr(species.name);
    const rng = this.seededRng(seed);
    const hue = (seed * 137) % 360;
    const col1 = `hsl(${hue}, 80%, 60%)`;
    const col2 = `hsl(${(hue + 40) % 360}, 70%, 50%)`;
    const glow = `hsl(${hue}, 90%, 70%)`;

    let inner = '';
    const type = species.type || 'creature';

    if (type === 'plant' || type === 'fungus') {
      // Organic plant/fungus shape
      const stemH = 10 + rng() * 15;
      const stemX = size / 2;
      const stemBot = size - 5;
      inner += `<line x1="${stemX}" y1="${stemBot}" x2="${stemX + (rng()-0.5)*8}" y2="${stemBot - stemH}" stroke="${col2}" stroke-width="2" stroke-linecap="round"/>`;
      // Blobs/caps
      const numBlobs = type === 'fungus' ? 1 + Math.floor(rng() * 2) : 2 + Math.floor(rng() * 3);
      for (let i = 0; i < numBlobs; i++) {
        const bx = stemX + (rng() - 0.5) * 20;
        const by = stemBot - stemH - rng() * 12;
        const br = 4 + rng() * 8;
        inner += `<ellipse cx="${bx}" cy="${by}" rx="${br}" ry="${br * (0.6 + rng()*0.6)}" fill="${col1}" opacity="0.85">`;
        inner += `<animate attributeName="opacity" values="0.7;1;0.7" dur="${1.5+rng()*2}s" repeatCount="indefinite"/></ellipse>`;
      }
      // Glow dot
      inner += `<circle cx="${stemX}" cy="${stemBot - stemH - 4}" r="3" fill="${glow}" opacity="0.6"><animate attributeName="r" values="2;4;2" dur="${2+rng()}s" repeatCount="indefinite"/></circle>`;
    } else if (type === 'mineral') {
      // Crystal shapes
      const n = 2 + Math.floor(rng() * 3);
      for (let i = 0; i < n; i++) {
        const cx = size / 2 + (rng() - 0.5) * 20;
        const bot = size - 5;
        const h = 10 + rng() * 20;
        const w = 3 + rng() * 6;
        inner += `<polygon points="${cx},${bot - h} ${cx - w},${bot} ${cx + w},${bot}" fill="${col1}" opacity="${0.6 + rng()*0.3}" stroke="${glow}" stroke-width="0.5"/>`;
      }
      inner += `<circle cx="${size/2}" cy="${size/2 - 4}" r="4" fill="${glow}" opacity="0.4"><animate attributeName="opacity" values="0.3;0.7;0.3" dur="${2+rng()}s" repeatCount="indefinite"/></circle>`;
    } else {
      // Creature: body + appendages
      const cx = size / 2;
      const cy = size / 2 + 2;
      const bodyRx = 6 + rng() * 8;
      const bodyRy = 5 + rng() * 6;
      inner += `<ellipse cx="${cx}" cy="${cy}" rx="${bodyRx}" ry="${bodyRy}" fill="${col1}" opacity="0.9"/>`;
      // Eyes
      const eyeOff = bodyRx * 0.4;
      const eyeY = cy - bodyRy * 0.2;
      inner += `<circle cx="${cx - eyeOff}" cy="${eyeY}" r="2" fill="#fff"/>`;
      inner += `<circle cx="${cx + eyeOff}" cy="${eyeY}" r="2" fill="#fff"/>`;
      inner += `<circle cx="${cx - eyeOff}" cy="${eyeY}" r="1" fill="#111"/>`;
      inner += `<circle cx="${cx + eyeOff}" cy="${eyeY}" r="1" fill="#111"/>`;
      // Appendages
      const numLegs = Math.floor(rng() * 4) * 2;
      for (let i = 0; i < numLegs; i++) {
        const side = i % 2 === 0 ? -1 : 1;
        const lx = cx + side * (bodyRx + 2 + rng() * 4);
        const ly = cy + (i - numLegs/2) * 3 + bodyRy * 0.3;
        inner += `<line x1="${cx + side * bodyRx}" y1="${cy + (i - numLegs/2)*2}" x2="${lx}" y2="${ly}" stroke="${col2}" stroke-width="1.5" stroke-linecap="round"/>`;
      }
      // Optional antenna/tail
      if (rng() > 0.5) {
        inner += `<path d="M${cx},${cy - bodyRy} Q${cx + (rng()-0.5)*15},${cy - bodyRy - 12} ${cx + (rng()-0.5)*10},${cy - bodyRy - 8}" stroke="${glow}" stroke-width="1" fill="none"/>`;
        inner += `<circle cx="${cx + (rng()-0.5)*8}" cy="${cy - bodyRy - 9}" r="2" fill="${glow}" opacity="0.8"><animate attributeName="opacity" values="0.5;1;0.5" dur="${1+rng()}s" repeatCount="indefinite"/></circle>`;
      }
      // Pulse animation
      inner += `<ellipse cx="${cx}" cy="${cy}" rx="${bodyRx + 2}" ry="${bodyRy + 2}" fill="none" stroke="${glow}" stroke-width="0.5" opacity="0.3"><animate attributeName="opacity" values="0;0.4;0" dur="${2+rng()*2}s" repeatCount="indefinite"/></ellipse>`;
    }

    return `<svg viewBox="0 0 ${size} ${size}" xmlns="http://www.w3.org/2000/svg">${inner}</svg>`;
  },

  hashStr(str) {
    let h = 0;
    for (let i = 0; i < str.length; i++) {
      h = ((h << 5) - h + str.charCodeAt(i)) | 0;
    }
    return Math.abs(h);
  },

  seededRng(seed) {
    let s = seed;
    return () => {
      s = (s * 16807 + 0) % 2147483647;
      return (s - 1) / 2147483646;
    };
  },

  // ---- Particle System ----
  initParticles() {
    this.pCanvas = document.getElementById('particle-canvas');
    this.pCtx = this.pCanvas.getContext('2d');
    this.resizeCanvas();
    window.addEventListener('resize', () => this.resizeCanvas());
  },

  resizeCanvas() {
    const rect = this.pCanvas.parentElement.getBoundingClientRect();
    this.pCanvas.width = rect.width * window.devicePixelRatio;
    this.pCanvas.height = rect.height * window.devicePixelRatio;
    this.pCanvas.style.width = rect.width + 'px';
    this.pCanvas.style.height = rect.height + 'px';
    this.pCtx.scale(window.devicePixelRatio, window.devicePixelRatio);
    this.canvasW = rect.width;
    this.canvasH = rect.height;
  },

  spawnParticle(x, y, color, count = 3) {
    for (let i = 0; i < count; i++) {
      this.particles.push({
        x, y,
        vx: (Math.random() - 0.5) * 3,
        vy: -Math.random() * 3 - 1,
        life: 1,
        decay: 0.02 + Math.random() * 0.02,
        size: 2 + Math.random() * 3,
        color
      });
    }
  },

  spawnAmbientParticle() {
    if (!this.currentBiome) return;
    const biome = this.biomes[this.currentBiome];
    this.particles.push({
      x: Math.random() * this.canvasW,
      y: this.canvasH + 5,
      vx: (Math.random() - 0.5) * 0.5,
      vy: -0.3 - Math.random() * 0.8,
      life: 1,
      decay: 0.005 + Math.random() * 0.005,
      size: 1 + Math.random() * 2,
      color: biome.color
    });
  },

  updateParticles() {
    this.pCtx.clearRect(0, 0, this.canvasW, this.canvasH);
    for (let i = this.particles.length - 1; i >= 0; i--) {
      const p = this.particles[i];
      p.x += p.vx;
      p.y += p.vy;
      p.life -= p.decay;
      if (p.life <= 0) {
        this.particles.splice(i, 1);
        continue;
      }
      this.pCtx.beginPath();
      this.pCtx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
      this.pCtx.fillStyle = p.color;
      this.pCtx.globalAlpha = p.life * 0.7;
      this.pCtx.fill();
      this.pCtx.globalAlpha = 1;
    }
  },

  // ---- Biome Background SVG ----
  renderBiomeSVG() {
    const svg = document.getElementById('biome-svg');
    if (!this.currentBiome) {
      svg.innerHTML = '';
      return;
    }
    const biome = this.biomes[this.currentBiome];
    const w = svg.clientWidth || 400;
    const h = svg.clientHeight || 400;

    let bg = '';
    // Gradient background
    bg += `<defs>
      <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
        <stop offset="0%" stop-color="${biome.bgGrad[0]}"/>
        <stop offset="100%" stop-color="${biome.bgGrad[1]}"/>
      </linearGradient>
      <filter id="glow"><feGaussianBlur stdDeviation="3" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    </defs>
    <rect width="100%" height="100%" fill="url(#bgGrad)"/>`;

    // Biome-specific background elements
    if (this.currentBiome === 'marsh') {
      // Water surface
      bg += `<rect x="0" y="${h*0.7}" width="100%" height="${h*0.3}" fill="rgba(0,80,40,0.3)"/>`;
      // Reeds
      for (let i = 0; i < 12; i++) {
        const x = (i / 12) * w + Math.random() * 30;
        const rh = 40 + Math.random() * 60;
        bg += `<line x1="${x}" y1="${h}" x2="${x + (Math.random()-0.5)*15}" y2="${h - rh}" stroke="rgba(40,120,60,0.5)" stroke-width="${1+Math.random()*2}" stroke-linecap="round"/>`;
      }
    } else if (this.currentBiome === 'cavern') {
      // Stalactites
      for (let i = 0; i < 8; i++) {
        const x = Math.random() * w;
        const sl = 20 + Math.random() * 50;
        bg += `<polygon points="${x-5},0 ${x+5},0 ${x},${sl}" fill="rgba(60,30,80,0.6)"/>`;
      }
      // Stalagmites
      for (let i = 0; i < 6; i++) {
        const x = Math.random() * w;
        const sl = 15 + Math.random() * 40;
        bg += `<polygon points="${x-6},${h} ${x+6},${h} ${x},${h-sl}" fill="rgba(50,25,70,0.5)"/>`;
      }
    } else if (this.currentBiome === 'canopy') {
      // Tree trunks
      for (let i = 0; i < 4; i++) {
        const x = 30 + i * (w / 4) + Math.random() * 40;
        bg += `<rect x="${x}" y="0" width="${8+Math.random()*12}" height="${h}" fill="rgba(30,60,20,0.4)" rx="4"/>`;
      }
      // Leaf clusters at top
      for (let i = 0; i < 10; i++) {
        const x = Math.random() * w;
        const y = Math.random() * h * 0.3;
        bg += `<circle cx="${x}" cy="${y}" r="${15+Math.random()*25}" fill="rgba(20,80,20,0.25)"/>`;
      }
    } else if (this.currentBiome === 'thermal') {
      // Vent cracks
      for (let i = 0; i < 5; i++) {
        const x = Math.random() * w;
        bg += `<line x1="${x}" y1="${h}" x2="${x+(Math.random()-0.5)*30}" y2="${h-30-Math.random()*40}" stroke="rgba(255,60,0,0.3)" stroke-width="${2+Math.random()*3}"/>`;
      }
      // Lava pool
      bg += `<ellipse cx="${w/2}" cy="${h-10}" rx="${w*0.4}" ry="20" fill="rgba(200,50,0,0.2)"/>`;
    }

    svg.innerHTML = bg;
    this.biomeEntities = [];
  },

  addEntityToSVG(species) {
    const svg = document.getElementById('biome-svg');
    const w = svg.clientWidth || 400;
    const h = svg.clientHeight || 400;
    const seed = this.hashStr(species.name);
    const rng = this.seededRng(seed + this.biomeEntities.length);

    const ex = 30 + rng() * (w - 80);
    const ey = 60 + rng() * (h - 120);

    const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
    g.setAttribute('transform', `translate(${ex}, ${ey})`);
    g.style.opacity = '0';
    g.style.transition = 'opacity 0.5s ease-in';

    const svgContent = this.generateSpeciesSVG(species, 40);
    // Parse inner content
    const tmp = document.createElement('div');
    tmp.innerHTML = svgContent;
    const innerSvg = tmp.querySelector('svg');
    g.innerHTML = innerSvg.innerHTML;

    // Float animation
    const animDur = 3 + rng() * 4;
    const floatAmt = 2 + rng() * 4;
    const animY = document.createElementNS('http://www.w3.org/2000/svg', 'animateTransform');
    animY.setAttribute('attributeName', 'transform');
    animY.setAttribute('type', 'translate');
    animY.setAttribute('values', `${ex},${ey} ${ex},${ey - floatAmt} ${ex},${ey}`);
    animY.setAttribute('dur', `${animDur}s`);
    animY.setAttribute('repeatCount', 'indefinite');
    g.appendChild(animY);

    svg.appendChild(g);
    requestAnimationFrame(() => g.style.opacity = '1');

    this.biomeEntities.push({species, element: g});
  },

  // ---- Core Game Loop ----
  init() {
    this.loadState();
    this.initParticles();
    this.setupTapZone();
    this._loopTaps = 0;

    // Show biome select if no active loop
    if (!this.loopActive) {
      this.showBiomeSelect();
    } else {
      this.renderBiomeSVG();
      this.reAddEntities();
    }

    this.updateUI();
    this.lastTime = performance.now();
    requestAnimationFrame(t => this.gameLoop(t));

    // Auto-save every 10 seconds
    setInterval(() => this.saveState(), 10000);
  },

  setupTapZone() {
    const tz = document.getElementById('tap-zone');
    const handler = (e) => {
      e.preventDefault();
      if (!this.loopActive) return;

      let x, y;
      if (e.touches) {
        const rect = tz.getBoundingClientRect();
        x = e.touches[0].clientX - rect.left;
        y = e.touches[0].clientY - rect.top;
      } else {
        x = e.offsetX;
        y = e.offsetY;
      }

      this.onTap(x, y);
    };

    tz.addEventListener('touchstart', handler, {passive: false});
    tz.addEventListener('mousedown', handler);
  },

  onTap(x, y) {
    this._loopTaps = (this._loopTaps || 0) + 1;
    const amount = Math.ceil(this.tapPower * this.residueMultiplier * (1 + this.loops * 0.15));
    this.residue += amount;
    this.totalResidue += amount;
    this.loopResidueEarned += amount;

    // Ripple effect
    const ripple = document.createElement('div');
    ripple.className = 'tap-ripple';
    ripple.style.left = (x - 30) + 'px';
    ripple.style.top = (y - 30) + 'px';
    document.getElementById('tap-zone').appendChild(ripple);
    setTimeout(() => ripple.remove(), 600);

    // Float text
    const ft = document.createElement('div');
    ft.className = 'float-text';
    ft.textContent = `+${amount}`;
    ft.style.left = (x - 10) + 'px';
    ft.style.top = (y - 20) + 'px';
    document.getElementById('tap-zone').appendChild(ft);
    setTimeout(() => ft.remove(), 1000);

    // Particles
    const rect = this.pCanvas.getBoundingClientRect();
    const px = x;
    const py = y + document.getElementById('biome-view').getBoundingClientRect().height * 0.5;
    const biome = this.biomes[this.currentBiome];
    this.spawnParticle(px, py, biome ? biome.color : '#00ff88', 2);

    this.updateUI();
    this.checkAchievements();
  },

  gameLoop(timestamp) {
    const dt = (timestamp - this.lastTime) / 1000;
    this.lastTime = timestamp;

    if (this.loopActive) {
      // Loop timer
      this.loopTimer -= dt;
      if (this.loopTimer <= 0) {
        this.endLoop();
        requestAnimationFrame(t => this.gameLoop(t));
        return;
      }

      // Timer bar
      const pct = (this.loopTimer / this.loopTime) * 100;
      document.getElementById('timer-bar').style.width = pct + '%';
      const secs = Math.ceil(this.loopTimer);
      document.getElementById('timer-text').textContent = secs + 's';

      // Change bar color near end
      const bar = document.getElementById('timer-bar');
      if (pct < 20) {
        bar.style.background = 'linear-gradient(90deg, #ff4444, #ff8800)';
        bar.style.boxShadow = '0 0 12px #ff4444';
      } else if (pct < 40) {
        bar.style.background = 'linear-gradient(90deg, #ff8800, #ffcc00)';
        bar.style.boxShadow = '0 0 8px #ff8800';
      } else {
        bar.style.background = 'linear-gradient(90deg, var(--glow-teal), var(--glow-green))';
        bar.style.boxShadow = '0 0 8px var(--glow-teal)';
      }

      // Species discovery
      this.speciesSpawnTimer += dt * this.discoverySpeed;
      if (this.speciesSpawnTimer >= this.nextSpeciesTime && this.biomeSpeciesPool.length > 0) {
        this.speciesSpawnTimer = 0;
        this.nextSpeciesTime = 6 + Math.random() * 7; // 6-13 seconds
        this.discoverSpecies();
      }

      // Auto collect
      if (this.autoCollect > 0) {
        const autoAmt = Math.ceil(this.autoCollect * this.residueMultiplier * (1 + this.loops * 0.1) * dt);
        this.residue += autoAmt;
        this.totalResidue += autoAmt;
        this.loopResidueEarned += autoAmt;
      }

      // Ambient particles
      if (Math.random() < 0.15) {
        this.spawnAmbientParticle();
      }

      // Quote timer
      this.quoteTimer -= dt;
      if (this.quoteTimer <= 0) {
        this.quoteTimer = 12 + Math.random() * 15;
        this.showRandomQuote();
      }
    }

    this.updateParticles();
    this.updateUI();
    requestAnimationFrame(t => this.gameLoop(t));
  },

  // ---- Species Discovery ----
  discoverSpecies() {
    if (this.biomeSpeciesPool.length === 0) return;

    // Pick a species weighted by rarity (lower rarity = more common)
    const pool = this.biomeSpeciesPool;
    const weights = pool.map(s => s.rarity === 1 ? 5 : s.rarity === 2 ? 3 : 1);
    const totalW = weights.reduce((a, b) => a + b, 0);
    let r = Math.random() * totalW;
    let idx = 0;
    for (let i = 0; i < weights.length; i++) {
      r -= weights[i];
      if (r <= 0) { idx = i; break; }
    }

    const species = pool.splice(idx, 1)[0];

    // Add to global codex if new
    const isNew = !this.discoveredSpecies.find(s => s.name === species.name);
    if (isNew) {
      species.biome = this.currentBiome;
      species.discoveredLoop = this.loops + 1;
      this.discoveredSpecies.push(species);
    }

    this.currentLoopSpecies.push(species);
    this.loopSpeciesFound++;

    // Add to biome view
    this.addEntityToSVG(species);

    // Toast
    this.showSpeciesToast(species, isNew);

    // Quote
    if (Math.random() < 0.4) {
      this.showQuote(this.randomFrom(this.quotes.discovery));
    }

    // Flash the biome view
    document.getElementById('biome-view').classList.add('discovery-flash');
    setTimeout(() => document.getElementById('biome-view').classList.remove('discovery-flash'), 500);

    // Residue bonus for discovery
    const bonus = species.rarity * 5 * this.residueMultiplier;
    this.residue += bonus;
    this.totalResidue += bonus;
    this.loopResidueEarned += bonus;

    this.checkAchievements();
  },

  showSpeciesToast(species, isNew) {
    const existing = document.querySelectorAll('.species-toast');
    existing.forEach(e => e.remove());

    const toast = document.createElement('div');
    toast.className = 'species-toast';
    toast.innerHTML = `
      ${this.generateSpeciesSVG(species, 36)}
      <div>
        <div class="st-name">${isNew ? 'NEW: ' : ''}${species.name}</div>
        <div class="st-type">${species.type} ${isNew ? '- Added to Codex!' : '- (already known)'}</div>
      </div>
    `;
    document.body.appendChild(toast);
    setTimeout(() => {
      toast.style.animation = 'toastOut 0.3s ease-in forwards';
      setTimeout(() => toast.remove(), 300);
    }, 2500);
  },

  // ---- Combination System ----
  clearSlot(idx) {
    this.combineSlots[idx] = null;
    this.renderCombinePanel();
  },

  selectForCombine(speciesName) {
    const species = this.discoveredSpecies.find(s => s.name === speciesName);
    if (!species) return;

    if (!this.combineSlots[0]) {
      this.combineSlots[0] = species;
    } else if (!this.combineSlots[1]) {
      if (this.combineSlots[0].name !== species.name) {
        this.combineSlots[1] = species;
      }
    } else {
      this.combineSlots[0] = species;
      this.combineSlots[1] = null;
    }
    this.renderCombinePanel();
  },

  doCombine() {
    const a = this.combineSlots[0];
    const b = this.combineSlots[1];
    if (!a || !b) return;

    // Check if this combo already exists
    const existing = this.combinations.find(c =>
      (c.a === a.name && c.b === b.name) || (c.a === b.name && c.b === a.name)
    );
    if (existing) {
      this.showQuote(`Already combined ${a.name} + ${b.name}. The result was ${existing.result}.`);
      return;
    }

    // Generate a combination result
    const result = this.generateCombination(a, b);

    this.combinations.push({a: a.name, b: b.name, result: result.name});
    this.combinationResults.push(result.name);

    // Add result to codex if new
    if (!this.discoveredSpecies.find(s => s.name === result.name)) {
      result.biome = 'combined';
      result.discoveredLoop = this.loops + 1;
      this.discoveredSpecies.push(result);
    }

    this.loopCombosFound++;

    // Residue bonus
    const bonus = 15 * this.residueMultiplier * result.rarity;
    this.residue += bonus;
    this.totalResidue += bonus;
    this.loopResidueEarned += bonus;

    // Show result popup
    document.getElementById('cr-name').textContent = result.name;
    document.getElementById('cr-desc').textContent = result.desc;
    document.getElementById('cr-svg-holder').innerHTML = this.generateSpeciesSVG(result, 80);
    document.getElementById('combo-result').classList.add('active');

    // Quote
    this.showQuote(this.randomFrom(this.quotes.combination));

    // Clear slots
    this.combineSlots = [null, null];

    this.checkAchievements();
    this.saveState();
  },

  generateCombination(a, b) {
    // Deterministic name based on inputs
    const seed = this.hashStr(a.name + b.name);
    const rng = this.seededRng(seed);

    const prefixes = ['Gloom', 'Bright', 'Twisted', 'Fused', 'Prismatic', 'Hollow', 'Echo', 'Phantom',
      'Shimmer', 'Void', 'Lunar', 'Solar', 'Drift', 'Storm', 'Frost', 'Blaze', 'Thorn', 'Silk', 'Neon', 'Dusk'];
    const suffixes = ['bloom', 'walker', 'spore', 'crawler', 'wisp', 'shade', 'lurker', 'sprout',
      'tendril', 'crystal', 'moth', 'fern', 'polyp', 'wraith', 'cap', 'vine', 'shell', 'horn', 'fin', 'eye'];

    const prefix = prefixes[Math.floor(rng() * prefixes.length)];
    const suffix = suffixes[Math.floor(rng() * suffixes.length)];
    const name = prefix + suffix;

    // Avoid duplicate names
    let finalName = name;
    let counter = 2;
    while (this.discoveredSpecies.find(s => s.name === finalName)) {
      finalName = name + ' ' + ['II', 'III', 'IV', 'V', 'VI', 'VII'][counter - 2] || counter;
      counter++;
    }

    const types = ['creature', 'plant', 'fungus', 'mineral'];
    const descs = [
      `Born from the fusion of ${a.name} and ${b.name}`,
      `An impossible hybrid of ${a.type} and ${b.type}`,
      `${a.name} meets ${b.name}. Nature is confused.`,
      `The offspring of temporal experimentation`,
      `Part ${a.name}, part ${b.name}, all weird`,
    ];

    return {
      name: finalName,
      type: types[Math.floor(rng() * types.length)],
      rarity: Math.max(a.rarity, b.rarity) + (rng() > 0.7 ? 1 : 0),
      desc: descs[Math.floor(rng() * descs.length)]
    };
  },

  closeComboResult() {
    document.getElementById('combo-result').classList.remove('active');
    this.renderCombinePanel();
  },

  // ---- Loop Management ----
  startLoop(biome) {
    this.currentBiome = biome;
    this.loopTimer = this.loopTime;
    this.loopActive = true;
    this.currentLoopSpecies = [];
    this.loopSpeciesFound = 0;
    this.loopResidueEarned = 0;
    this.loopCombosFound = 0;
    this._loopTaps = 0;
    this.speciesSpawnTimer = 0;
    this.nextSpeciesTime = 3 + Math.random() * 4; // First species comes fast

    // Build species pool for this biome (exclude already discovered this loop)
    this.biomeSpeciesPool = [...this.biomes[biome].species];

    // Hide overlay
    document.getElementById('screen-overlay').classList.remove('active');

    // Render biome
    this.renderBiomeSVG();

    // Biome quote
    const biomeQuotes = this.quotes[biome] || this.quotes.general;
    this.showQuote(this.randomFrom(biomeQuotes));
    this.quoteTimer = 10 + Math.random() * 10;

    this.updateUI();
    this.saveState();
  },

  endLoop() {
    this.loopActive = false;
    this.loops++;

    // Check biome unlocks
    for (const [key, biome] of Object.entries(this.biomes)) {
      if (!this.unlockedBiomes.includes(key) && this.loops >= biome.unlock) {
        this.unlockedBiomes.push(key);
        this.showAchievementToast(`Biome Unlocked: ${biome.name}!`, biome.icon);
      }
    }

    // Catastrophe quote
    this.showQuote(this.randomFrom(this.quotes.catastrophe));

    this.checkAchievements();
    this.saveState();

    // Show loop end screen
    setTimeout(() => this.showLoopEnd(), 800);
  },

  showLoopEnd() {
    const overlay = document.getElementById('screen-overlay');
    const content = document.getElementById('screen-content');

    // Generate marketplace items
    this.generateMarketItems();

    let html = `
      <div class="screen-title glow-teal">Loop ${this.loops} Complete</div>
      <div class="screen-subtitle">${this.randomFrom(this.quotes.catastrophe)}</div>
      <div class="loop-summary">
        <div class="loop-stat"><span>Species Found</span><span class="ls-val glow-green">${this.loopSpeciesFound}</span></div>
        <div class="loop-stat"><span>Residue Earned</span><span class="ls-val glow-green">${this.loopResidueEarned}</span></div>
        <div class="loop-stat"><span>Combinations</span><span class="ls-val glow-purple">${this.loopCombosFound}</span></div>
        <div class="loop-stat"><span>Total Species Known</span><span class="ls-val glow-teal">${this.discoveredSpecies.length}</span></div>
        <div class="loop-stat"><span>Total Residue</span><span class="ls-val glow-green">${this.formatNum(this.residue)}</span></div>
      </div>
    `;

    // Marketplace
    if (this.marketItems.length > 0) {
      html += `<div class="loop-market"><h3>Marketplace (refreshes each loop)</h3>`;
      for (const item of this.marketItems) {
        html += `
          <div class="market-item">
            <div class="market-info">
              <h3>${item.name}</h3>
              <p>${item.desc}</p>
            </div>
            <button class="market-buy" onclick="game.buyItem('${item.id}')" id="market-${item.id}"
              ${this.residue < item.cost ? 'disabled' : ''}>
              ${this.formatNum(item.cost)} TR
            </button>
          </div>`;
      }
      html += `</div>`;
    }

    // Biome select
    html += `<div style="font-size:14px;font-weight:700;margin-bottom:8px;color:var(--glow-amber);text-shadow:0 0 8px rgba(255,171,64,0.3)">Choose Next Biome</div>`;
    html += `<div class="biome-cards">`;
    for (const [key, biome] of Object.entries(this.biomes)) {
      const unlocked = this.unlockedBiomes.includes(key);
      html += `
        <div class="biome-card ${unlocked ? '' : 'locked'}" data-biome="${key}"
             onclick="${unlocked ? `game.startLoop('${key}')` : ''}">
          <div class="bc-icon">${biome.icon}</div>
          <div class="bc-name" style="color:${biome.color}">${biome.name}</div>
          <div class="bc-desc">${biome.desc}</div>
          ${!unlocked ? `<div class="bc-lock">Unlocks at loop ${biome.unlock}</div>` : ''}
        </div>`;
    }
    html += `</div>`;

    html += `<button class="btn-reset" onclick="game.hardReset()">Reset All Progress</button>`;

    content.innerHTML = html;
    overlay.classList.add('active');
  },

  showBiomeSelect() {
    const overlay = document.getElementById('screen-overlay');
    const content = document.getElementById('screen-content');

    let html = `
      <div class="screen-title glow-teal">TEMPORAL ECHOES</div>
      <div class="screen-subtitle">You are caught in a time loop. An ecosystem evolves around you.<br>Each catastrophe resets the world, but you remember everything.</div>
    `;

    html += `<div style="font-size:14px;font-weight:700;margin-bottom:8px;color:var(--glow-amber);text-shadow:0 0 8px rgba(255,171,64,0.3)">Choose a Biome</div>`;
    html += `<div class="biome-cards">`;
    for (const [key, biome] of Object.entries(this.biomes)) {
      const unlocked = this.unlockedBiomes.includes(key);
      html += `
        <div class="biome-card ${unlocked ? '' : 'locked'}" data-biome="${key}"
             onclick="${unlocked ? `game.startLoop('${key}')` : ''}">
          <div class="bc-icon">${biome.icon}</div>
          <div class="bc-name" style="color:${biome.color}">${biome.name}</div>
          <div class="bc-desc">${biome.desc}</div>
          ${!unlocked ? `<div class="bc-lock">Unlocks at loop ${biome.unlock}</div>` : ''}
        </div>`;
    }
    html += `</div>`;

    if (this.loops > 0) {
      html += `
        <div style="font-size:11px;color:var(--text-dim);margin-top:8px">
          ${this.discoveredSpecies.length} species known | ${this.loops} loops completed | ${this.formatNum(this.totalResidue)} TR total
        </div>`;
    }

    html += `<button class="btn-reset" onclick="game.hardReset()" style="margin-top:20px">Reset All Progress</button>`;

    content.innerHTML = html;
    overlay.classList.add('active');
  },

  // ---- Marketplace ----
  generateMarketItems() {
    const allItems = [
      {id: 'tap1', name: 'Temporal Amplifier', desc: 'Double tap power', cost: 25, effect: () => { this.tapPower *= 2; }},
      {id: 'tap2', name: 'Chrono Gauntlet', desc: '+3 tap power', cost: 40, effect: () => { this.tapPower += 3; }},
      {id: 'mult1', name: 'Residue Lens', desc: '+50% residue multiplier', cost: 50, effect: () => { this.residueMultiplier *= 1.5; }},
      {id: 'mult2', name: 'Echo Chamber', desc: '+100% residue multiplier', cost: 120, effect: () => { this.residueMultiplier *= 2; }},
      {id: 'disc1', name: 'Bio Scanner', desc: '+30% discovery speed', cost: 35, effect: () => { this.discoverySpeed *= 1.3; }},
      {id: 'disc2', name: 'Pheromone Lure', desc: '+50% discovery speed', cost: 75, effect: () => { this.discoverySpeed *= 1.5; }},
      {id: 'auto1', name: 'Idle Collector', desc: 'Auto-collect 1 TR/sec', cost: 60, effect: () => { this.autoCollect += 1; }},
      {id: 'auto2', name: 'Drone Harvester', desc: 'Auto-collect 3 TR/sec', cost: 150, effect: () => { this.autoCollect += 3; }},
      {id: 'auto3', name: 'Temporal Siphon', desc: 'Auto-collect 10 TR/sec', cost: 400, effect: () => { this.autoCollect += 10; }},
      {id: 'time1', name: 'Loop Extender', desc: '+15 seconds per loop', cost: 80, effect: () => { this.loopTime += 15; }},
      {id: 'time2', name: 'Chrono Anchor', desc: '+30 seconds per loop', cost: 200, effect: () => { this.loopTime += 30; }},
      {id: 'res1', name: 'Residue Burst', desc: 'Instant +100 TR', cost: 20, effect: () => { this.residue += 100; this.totalResidue += 100; }},
      {id: 'res2', name: 'Temporal Windfall', desc: 'Instant +500 TR', cost: 80, effect: () => { this.residue += 500; this.totalResidue += 500; }},
    ];

    // Pick 3-4 random items, scaling cost with loops
    const count = 3 + (Math.random() > 0.5 ? 1 : 0);
    const shuffled = allItems.sort(() => Math.random() - 0.5);
    this.marketItems = shuffled.slice(0, count).map(item => ({
      ...item,
      cost: Math.ceil(item.cost * (1 + this.loops * 0.1))
    }));
  },

  buyItem(id) {
    const item = this.marketItems.find(i => i.id === id);
    if (!item || this.residue < item.cost) return;

    this.residue -= item.cost;
    item.effect();

    // Disable button
    const btn = document.getElementById('market-' + id);
    if (btn) {
      btn.disabled = true;
      btn.textContent = 'Bought!';
    }

    // Re-check other buttons
    for (const mi of this.marketItems) {
      const b = document.getElementById('market-' + mi.id);
      if (b && b.textContent !== 'Bought!') {
        b.disabled = this.residue < mi.cost;
      }
    }

    this.saveState();
  },

  // ---- Achievements ----
  checkAchievements() {
    for (const def of this.achievementDefs) {
      if (this.achievements.includes(def.id)) continue;
      if (def.check(this)) {
        this.achievements.push(def.id);
        this.showAchievementToast(def.name, def.icon);

        // Bonus residue for achievements
        const bonus = 10 + this.loops * 2;
        this.residue += bonus;
        this.totalResidue += bonus;
      }
    }
  },

  showAchievementToast(name, icon) {
    const toast = document.createElement('div');
    toast.className = 'toast';
    toast.innerHTML = `
      <div class="toast-title">${icon || '\u{1F3C6}'} Achievement Unlocked</div>
      <div class="toast-name">${name}</div>
    `;
    document.body.appendChild(toast);
    setTimeout(() => {
      toast.style.animation = 'toastOut 0.4s ease-in forwards';
      setTimeout(() => toast.remove(), 400);
    }, 2800);
  },

  // ---- Quotes ----
  showQuote(text) {
    const bar = document.getElementById('quote-bar');
    bar.style.opacity = '0';
    setTimeout(() => {
      bar.textContent = `"${text}"`;
      bar.style.opacity = '1';
    }, 200);
  },

  showRandomQuote() {
    const pool = [...this.quotes.general];
    if (this.currentBiome && this.quotes[this.currentBiome]) {
      pool.push(...this.quotes[this.currentBiome]);
    }
    this.showQuote(this.randomFrom(pool));
  },

  // ---- UI ----
  switchTab(tab) {
    this.activeTab = tab;

    // Update tab buttons
    document.querySelectorAll('#bottom-tabs button').forEach((btn, i) => {
      const tabs = ['biome', 'codex', 'combine', 'market', 'achievements'];
      btn.classList.toggle('active', tabs[i] === tab);
    });

    // Hide all panels
    document.querySelectorAll('.panel-overlay').forEach(p => p.classList.remove('active'));

    if (tab === 'codex') {
      this.renderCodexPanel();
      document.getElementById('panel-codex').classList.add('active');
    } else if (tab === 'combine') {
      this.renderCombinePanel();
      document.getElementById('panel-combine').classList.add('active');
    } else if (tab === 'market') {
      this.renderMarketPanel();
      document.getElementById('panel-market').classList.add('active');
    } else if (tab === 'achievements') {
      this.renderAchievementsPanel();
      document.getElementById('panel-achievements').classList.add('active');
    }
  },

  renderCodexPanel() {
    const grid = document.getElementById('codex-grid');
    document.getElementById('codex-count').textContent = `(${this.discoveredSpecies.length} species)`;

    let html = '';
    for (const species of this.discoveredSpecies) {
      const isNew = this.currentLoopSpecies.includes(species);
      html += `
        <div class="codex-entry ${isNew ? 'new' : ''}">
          ${this.generateSpeciesSVG(species, 50)}
          <div class="species-name">${species.name}</div>
          <div style="font-size:8px;color:var(--text-dim)">${species.type}</div>
        </div>`;
    }

    if (this.discoveredSpecies.length === 0) {
      html = '<div style="text-align:center;color:var(--text-dim);padding:40px;font-size:13px">No species discovered yet.<br>Start a loop to explore!</div>';
    }

    grid.innerHTML = html;
  },

  renderCombinePanel() {
    // Slots
    const slotA = document.getElementById('slot-a');
    const slotB = document.getElementById('slot-b');

    if (this.combineSlots[0]) {
      slotA.innerHTML = this.generateSpeciesSVG(this.combineSlots[0], 50) + `<span style="font-size:9px;color:var(--glow-teal)">${this.combineSlots[0].name}</span>`;
      slotA.classList.add('filled');
    } else {
      slotA.innerHTML = '<span>Tap to<br>select</span>';
      slotA.classList.remove('filled');
    }

    if (this.combineSlots[1]) {
      slotB.innerHTML = this.generateSpeciesSVG(this.combineSlots[1], 50) + `<span style="font-size:9px;color:var(--glow-teal)">${this.combineSlots[1].name}</span>`;
      slotB.classList.add('filled');
    } else {
      slotB.innerHTML = '<span>Tap to<br>select</span>';
      slotB.classList.remove('filled');
    }

    // Combine button
    const btn = document.getElementById('combine-btn');
    const ready = this.combineSlots[0] && this.combineSlots[1];
    btn.classList.toggle('ready', ready);

    // Species list
    const list = document.getElementById('combine-list');
    let html = '';
    for (const species of this.discoveredSpecies) {
      const selected = (this.combineSlots[0] && this.combineSlots[0].name === species.name) ||
                       (this.combineSlots[1] && this.combineSlots[1].name === species.name);
      html += `
        <div class="combine-pick" style="${selected ? 'border-color:var(--glow-purple);opacity:0.5' : ''}"
             onclick="game.selectForCombine('${species.name.replace(/'/g, "\\'")}')">
          ${this.generateSpeciesSVG(species, 40)}
          <div style="color:var(--glow-teal)">${species.name}</div>
        </div>`;
    }

    if (this.discoveredSpecies.length < 2) {
      html = '<div style="text-align:center;color:var(--text-dim);padding:30px;font-size:12px">Discover at least 2 species to start combining!</div>';
    }

    list.innerHTML = html;
  },

  renderMarketPanel() {
    const content = document.getElementById('market-content');
    let html = '<div style="margin-bottom:12px;font-size:12px;color:var(--text-dim)">Upgrades persist between loops. Marketplace refreshes each loop.</div>';

    html += `<div style="margin-bottom:12px">
      <div style="font-size:11px;color:var(--text-dim);margin-bottom:4px">Your Stats</div>
      <div class="market-item" style="flex-direction:column;align-items:flex-start;gap:4px">
        <div style="font-size:11px">Tap Power: <span class="glow-green">${this.tapPower}</span></div>
        <div style="font-size:11px">Residue Multiplier: <span class="glow-green">${this.residueMultiplier.toFixed(1)}x</span></div>
        <div style="font-size:11px">Discovery Speed: <span class="glow-green">${this.discoverySpeed.toFixed(1)}x</span></div>
        <div style="font-size:11px">Auto Collect: <span class="glow-green">${this.autoCollect}/sec</span></div>
        <div style="font-size:11px">Loop Time: <span class="glow-green">${this.loopTime}s</span></div>
      </div>
    </div>`;

    html += `<div style="font-size:13px;font-weight:700;color:var(--glow-amber);margin-bottom:8px">Current Offerings</div>`;

    if (this.marketItems.length === 0) {
      html += '<div style="color:var(--text-dim);font-size:12px;padding:20px;text-align:center">Complete a loop to see marketplace offerings!</div>';
    }

    for (const item of this.marketItems) {
      html += `
        <div class="market-item">
          <div class="market-info">
            <h3>${item.name}</h3>
            <p>${item.desc}</p>
          </div>
          <button class="market-buy" onclick="game.buyMarketItem('${item.id}')"
            ${this.residue < item.cost ? 'disabled' : ''}>
            ${this.formatNum(item.cost)} TR
          </button>
        </div>`;
    }

    content.innerHTML = html;
  },

  buyMarketItem(id) {
    const item = this.marketItems.find(i => i.id === id);
    if (!item || this.residue < item.cost) return;

    this.residue -= item.cost;
    item.effect();
    this.marketItems = this.marketItems.filter(i => i.id !== id);
    this.renderMarketPanel();
    this.updateUI();
    this.saveState();
  },

  renderAchievementsPanel() {
    const content = document.getElementById('ach-content');
    let html = `<div style="margin-bottom:8px;font-size:12px;color:var(--text-dim)">${this.achievements.length}/${this.achievementDefs.length} unlocked</div>`;

    for (const def of this.achievementDefs) {
      const unlocked = this.achievements.includes(def.id);
      html += `
        <div class="achievement-item ${unlocked ? '' : 'locked'}">
          <div class="ach-icon">${def.icon}</div>
          <div class="ach-info">
            <h3 ${unlocked ? 'class="glow-amber"' : ''}>${def.name}</h3>
            <p>${def.desc}</p>
          </div>
        </div>`;
    }

    content.innerHTML = html;
  },

  updateUI() {
    document.getElementById('hd-residue').textContent = this.formatNum(this.residue);
    document.getElementById('hd-species').textContent = this.discoveredSpecies.length;
    document.getElementById('hd-loops').textContent = this.loops;
  },

  reAddEntities() {
    // Re-add current loop species to SVG after a reload
    for (const species of this.currentLoopSpecies) {
      this.addEntityToSVG(species);
    }
  },

  // ---- Persistence ----
  saveState() {
    const state = {
      residue: this.residue,
      totalResidue: this.totalResidue,
      loops: this.loops,
      currentBiome: this.currentBiome,
      loopTime: this.loopTime,
      loopTimer: this.loopTimer,
      loopActive: this.loopActive,
      discoveredSpecies: this.discoveredSpecies,
      combinations: this.combinations,
      combinationResults: this.combinationResults,
      achievements: this.achievements,
      unlockedBiomes: this.unlockedBiomes,
      residueMultiplier: this.residueMultiplier,
      discoverySpeed: this.discoverySpeed,
      tapPower: this.tapPower,
      autoCollect: this.autoCollect,
      comboBonus: this.comboBonus,
    };
    try {
      localStorage.setItem('temporal_echoes_b', JSON.stringify(state));
    } catch (e) {}
  },

  loadState() {
    try {
      const data = JSON.parse(localStorage.getItem('temporal_echoes_b'));
      if (!data) return;
      this.residue = data.residue || 0;
      this.totalResidue = data.totalResidue || 0;
      this.loops = data.loops || 0;
      this.currentBiome = data.currentBiome || null;
      this.loopTime = data.loopTime || 75;
      this.loopTimer = data.loopTimer || 75;
      this.loopActive = false; // Don't resume mid-loop
      this.discoveredSpecies = data.discoveredSpecies || [];
      this.combinations = data.combinations || [];
      this.combinationResults = data.combinationResults || [];
      this.achievements = data.achievements || [];
      this.unlockedBiomes = data.unlockedBiomes || ['marsh'];
      this.residueMultiplier = data.residueMultiplier || 1;
      this.discoverySpeed = data.discoverySpeed || 1;
      this.tapPower = data.tapPower || 1;
      this.autoCollect = data.autoCollect || 0;
      this.comboBonus = data.comboBonus || 0;
    } catch (e) {}
  },

  hardReset() {
    if (confirm('Reset ALL progress? This cannot be undone!')) {
      localStorage.removeItem('temporal_echoes_b');
      location.reload();
    }
  },

  // ---- Helpers ----
  formatNum(n) {
    if (n >= 1000000) return (n / 1000000).toFixed(1) + 'M';
    if (n >= 10000) return (n / 1000).toFixed(1) + 'K';
    if (n >= 1000) return (n / 1000).toFixed(1) + 'K';
    return Math.floor(n).toString();
  },

  randomFrom(arr) {
    return arr[Math.floor(Math.random() * arr.length)];
  },
};

// Start the game
window.addEventListener('DOMContentLoaded', () => game.init());
</script>
</body>
</html>
